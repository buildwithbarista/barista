# Pure cycle: A -> B -> C -> A. The strict resolver must detect the
# back-edge and surface a cycle conflict. We list all three edges in
# the cycle as expected.

id = "07-cycle"
description = "Three-node back-edge cycle A -> B -> C -> A."
expected_outcome = "Conflict"

[[expected_edges]]
from  = "org.example:a:1.0.0"
to    = "org.example:b"
range = "1.0.0"

[[expected_edges]]
from  = "org.example:b:1.0.0"
to    = "org.example:c"
range = "1.0.0"

[[expected_edges]]
from  = "org.example:c:1.0.0"
to    = "org.example:a"
range = "1.0.0"

[[node]]
coords = "org.example:root"
version = "1.0.0"
dependencies = [
    { coords = "org.example:a", version = "1.0.0" },
]

[[node]]
coords = "org.example:a"
version = "1.0.0"
dependencies = [
    { coords = "org.example:b", version = "1.0.0" },
]

[[node]]
coords = "org.example:b"
version = "1.0.0"
dependencies = [
    { coords = "org.example:c", version = "1.0.0" },
]

[[node]]
coords = "org.example:c"
version = "1.0.0"
dependencies = [
    { coords = "org.example:a", version = "1.0.0" },
]
