# Version comparison fixture corpus for the barista-version crate.
#
# Each [[case]] declares two version strings and an expected ordering:
#   - "lt" — left  <  right
#   - "eq" — left  == right (canonical equality, not raw string equality)
#   - "gt" — left  >  right
#
# Cases are grouped into sections by comment headers; the parser treats
# them as a flat list. Section headers exist purely so reviewers can
# audit coverage.
#
# Optional `notes` strings document provenance and intent. Cases marked
# "tentative" require runtime confirmation against the upstream Maven
# implementation; the property test will surface mismatches.
#
# Ported cases come from Apache Maven's ComparableVersionTest:
#   https://github.com/apache/maven/blob/master/compat/maven-artifact/src/test/java/org/apache/maven/artifact/versioning/ComparableVersionTest.java
#
# Apache Maven is licensed under the Apache License 2.0. Test inputs
# (the version strings themselves) are facts and not copyrightable;
# they are reproduced here for interoperability testing only.


# =================================================================
# PORTED FROM UPSTREAM
# =================================================================

