[package]
name = "barista-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "The barista CLI binary."
publish = false

[lib]
path = "src/lib.rs"

[[bin]]
name = "barista"
path = "src/main.rs"

[dependencies]
clap = { version = "4.6", features = ["derive", "env"] }
thiserror = "2"

[dev-dependencies]
insta = "1.47"
tempfile = "3"
