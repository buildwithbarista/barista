# Software Composition Analysis — dependency vulnerability scanning.
#
# Runs five overlapping scanners on every PR and every push to `main`.
# Overlap is intentional: cargo-audit/cargo-deny lean on the
# RustSec advisory database; OSV-Scanner uses the OSV.dev union; OWASP DC
# uses the NVD; Trivy uses its own vulnerability metadata. The four
# databases disagree on a non-trivial subset of advisories, so the union
# catches more than any one scanner.
#
# Coverage:
#   Rust   — cargo-deny, cargo-audit, OSV-Scanner, Trivy
#   Java   — OSV-Scanner, OWASP Dependency-Check, Trivy
#   Other  — Trivy (lockfile types neither cargo-* nor OSV covers)
#
# Every action is pinned to a commit SHA (not a floating tag). The
# human-readable tag is recorded next to the SHA so future readers can audit
# drift. When bumping, update both the SHA and the comment.
#
# Findings are uploaded to GitHub code scanning as SARIF where the scanner
# supports it. Failures here block merges to `main`.

name: SCA — dependency vulnerability scanning

on:
  pull_request:
  push:
    branches: [main]
  # NOTE: the nightly fresh-DB scan lives in `sca-nightly.yml`. This
  # workflow runs only on PR + push to `main` — those are the gates
  # that must block merges. The nightly cadence (catching CVEs
  # published between PRs) is owned by `sca-nightly.yml` and the
  # issue-filing path that fires off its `workflow_run` completion.

# Default-deny at the workflow level; each job opts in explicitly.
permissions: {}

jobs:

  # ---------------------------------------------------------------------------
  # cargo-deny — advisories, license allowlist, banned crates, source allowlist.
  # Config lives in deny.toml at the repo root.
  # ---------------------------------------------------------------------------
  cargo-deny-check:
    name: cargo-deny
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      # The EmbarkStudios action is the gate (sets exit code).
      # The SARIF emit + upload below runs even on failure so the
      # findings show up in the Security tab under `category: cargo-deny`.
      # `--format json` output is captured in a separate invocation so
      # the action's pinning policy is preserved and the SARIF step is
      # purely additive.
      - name: Run cargo-deny (gate)
        id: cargo-deny-gate
        continue-on-error: true
        uses: EmbarkStudios/cargo-deny-action@6c8f9facfa5047ec02d8485b6bf52b587b7777d1 # v2.0.18
        with:
          # Run all four checks; the default is `check` with no further args,
          # which expands to advisories + bans + licenses + sources.
          command: check
          arguments: --all-features
      - name: Install cargo-deny CLI (for SARIF emit)
        if: always()
        run: |
          set -euo pipefail
          cargo install cargo-deny --locked --version 0.18.4
      - name: Emit cargo-deny SARIF
        if: always()
        run: |
          set -euo pipefail
          # `--format json` lands on stderr; tolerate non-zero exit so
          # SARIF generation never masks a finding. The adapter handles
          # an empty/partial stream gracefully.
          cargo deny check --format json --all-features 2> cargo-deny.json || true
          python3 .github/scripts/cargo-deny-to-sarif.py \
            < cargo-deny.json > cargo-deny.sarif
      - name: Upload cargo-deny SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7fd177fa680c9881b53cdab4d346d32574c9f7f4 # v3.35.4
        with:
          sarif_file: cargo-deny.sarif
          category: cargo-deny
      - name: Fail if cargo-deny gate failed
        if: steps.cargo-deny-gate.outcome == 'failure'
        run: |
          echo "::error::cargo-deny reported violations; see SARIF upload + step log."
          exit 1

  # ---------------------------------------------------------------------------
  # cargo-audit — RustSec advisory scan against Cargo.lock. Overlaps with
  # cargo-deny's [advisories] section by design: the two tools occasionally
  # disagree on what an advisory means for a workspace and we want the
  # broader signal.
  #
  # continue-on-error: true — cargo-audit is a SOFT gate. The advisory-DB
  # TOML parser (RUSTSEC-2026-0076.md) and the rustsec/audit-check action
  # itself have suffered upstream breakage outside our control. cargo-deny
  # and OSV-Scanner (both hard gates in this workflow) cover the same
  # advisory surface and remain the merge-blocking signal. cargo-audit runs
  # for belt-and-suspenders signal only; a failure here does not block a PR.
  #
  # Local reproduction:
  #   cargo install cargo-audit --locked
  #   cargo audit
  # ---------------------------------------------------------------------------
  cargo-audit-check:
    name: cargo-audit
    runs-on: ubuntu-latest
    continue-on-error: true  # soft gate — upstream DB/action breakage; cargo-deny + OSV are the hard gates
    permissions:
      contents: read
      issues: write
      # `rustsec/audit-check` opens issues on `push: main` failures by default;
      # `issues: write` is the documented requirement.
      security-events: write  # for the SARIF emit step below
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      # rustsec/audit-check is the gate (sets exit code; opens issues on
      # `push: main` failures); the SARIF emit + upload below runs even on
      # failure so findings show up in the Security tab under
      # `category: cargo-audit`.
      - name: Run cargo-audit (gate)
        id: cargo-audit-gate
        continue-on-error: true
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install cargo-audit CLI (for SARIF emit)
        if: always()
        run: |
          set -euo pipefail
          cargo install cargo-audit --locked --version 0.21.2
      - name: Emit cargo-audit SARIF
        if: always()
        run: |
          set -euo pipefail
          cargo audit --json > cargo-audit.json || true
          python3 .github/scripts/cargo-audit-to-sarif.py \
            < cargo-audit.json > cargo-audit.sarif
      - name: Upload cargo-audit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7fd177fa680c9881b53cdab4d346d32574c9f7f4 # v3.35.4
        with:
          sarif_file: cargo-audit.sarif
          category: cargo-audit
      - name: Fail if cargo-audit gate failed
        if: steps.cargo-audit-gate.outcome == 'failure'
        run: |
          echo "::error::cargo-audit reported advisories; see SARIF upload + step log."
          exit 1

  # ---------------------------------------------------------------------------
  # OSV-Scanner — Cargo (Cargo.lock) + Maven (barback/pom.xml) coverage from
  # the OSV.dev database union. SARIF is uploaded to code scanning via the
  # reusable workflow's built-in step.
  #
  # We call the reusable workflow (not the action directly): the reusable
  # version handles SARIF generation + upload, which the raw action does
  # not.
  # ---------------------------------------------------------------------------
  osv-scanner:
    name: OSV-Scanner
    permissions:
      contents: read
      security-events: write
      actions: read
    # google/osv-scanner-action ships a reusable workflow that wraps the
    # action + SARIF upload. Pinned to the same SHA as the action itself.
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      # `-r ./` recurses from the repo root, picking up both Cargo.lock and
      # barback/pom.xml automatically. OSV-Scanner identifies lockfile types
      # by filename.
      scan-args: |-
        -r
        --skip-git
        ./

  # ---------------------------------------------------------------------------
  # OWASP Dependency-Check — Maven-side belt-and-suspenders alongside
  # OSV-Scanner. OWASP DC uses the NVD vulnerability database, OSV uses the
  # OSV.dev union; they disagree on a non-trivial subset of advisories.
  #
  # Configured in barback/pom.xml under the `dependency-check` profile so
  # local builds don't pay the NVD-download cost on every `mvn verify`. Pass
  # `-P dependency-check` (or `-Ddependency-check.skip=false`) to opt in.
  # ---------------------------------------------------------------------------
  barback-owasp-dc:
    name: OWASP Dependency-Check (barback)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Cache OWASP Dependency-Check NVD data
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-dc-${{ runner.os }}-${{ hashFiles('barback/pom.xml') }}
          restore-keys: |
            owasp-dc-${{ runner.os }}-
      - name: Run dependency-check (verify phase, opt-in profile)
        env:
          # Optional; if a contributor sets NVD_API_KEY as a repo secret the
          # plugin uses the higher-rate-limited NVD API endpoint. The plugin
          # still works (slower) without it.
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mvn -f barback/pom.xml -B -P dependency-check verify
      # The plugin's `<formats>` block in `barback/pom.xml` includes SARIF,
      # so a SARIF report lands at `barback/target/dependency-check-report.sarif`
      # on every run. Upload it so OWASP DC findings join the rest of the
      # security suite in the Security tab under `category: owasp-dc`,
      # matching the lowercase-tool-name convention used by every other
      # scanner in this workflow (and across sast.yml / secret-scan.yml).
      # `if: always()` so a failed mvn (the intended `failBuildOnCVSS=7`
      # behavior) still surfaces the findings rather than hiding them.
      - name: Upload OWASP DC SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7fd177fa680c9881b53cdab4d346d32574c9f7f4 # v3.35.4
        with:
          sarif_file: barback/target/dependency-check-report.sarif
          category: owasp-dc

  # ---------------------------------------------------------------------------
  # Trivy `fs` scan — cross-ecosystem catch-all. Picks up lockfile types and
  # IaC misconfigurations that none of the language-specific scanners
  # reliably cover.
  #
  # `secret` scanner is intentionally NOT enabled here — secret scanning is
  # owned by the dedicated secret-scan workflow (gitleaks + trufflehog) so
  # we don't double-report and so the allowlist semantics stay coherent.
  # ---------------------------------------------------------------------------
  trivy-fs:
    name: Trivy fs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Run Trivy (filesystem scan, SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          # `vuln` + `misconfig` only — `secret` is owned by the secret-scan
          # workflow. Adding it here would create a parallel allowlist
          # surface that drifts from .gitleaksignore.
          scanners: vuln,misconfig
          format: sarif
          output: trivy-results.sarif
          # Surface High+ findings; the SARIF upload still records Low/Med.
          severity: CRITICAL,HIGH
          # Fail the job on any finding at the configured severity.
          exit-code: '1'
          ignore-unfixed: false
      - name: Upload SARIF to code scanning
        # Always upload, even when the scan step failed, so reviewers can
        # inspect the findings in the Security tab.
        if: always()
        uses: github/codeql-action/upload-sarif@7fd177fa680c9881b53cdab4d346d32574c9f7f4 # v3.35.4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs
