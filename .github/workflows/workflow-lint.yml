# Workflow-file linting.
#
# Two complementary static analyzers cover the workflow files in this
# directory:
#
#   zizmor      — GitHub-Actions security analyzer. Catches dangerous
#                 patterns the action ecosystem keeps re-discovering:
#                 `pull_request_target` + untrusted-PR checkout,
#                 expression injection via `${{ github.event.* }}`,
#                 unscoped `GITHUB_TOKEN` permissions, broken `if:`
#                 short-circuiting, and so on.
#   actionlint  — workflow syntax + shell-script linter. Different rule
#                 set from zizmor (no security focus); the two
#                 complement each other.
#
# Both binaries see every `.yml`/`.yaml` file in `.github/workflows/`.
# The synthetic-fixture job (see below) proves zizmor's gate is wired
# correctly: it scans an intentionally-vulnerable workflow file under
# `tests/fixtures/workflow-lint/` and fails if zizmor doesn't flag it.
#
# Every action is pinned to a commit SHA (not a floating tag). The
# human-readable tag is recorded next to the SHA so future readers
# can audit drift without external tools. When bumping, update both
# the SHA and the comment.

name: Workflow lint

on:
  # Only the inputs this workflow actually lints: the workflows +
  # automation config under .github/, and the synthetic fixture the
  # zizmor round-trip asserts on. PRs that touch none of these skip the
  # run entirely.
  pull_request:
    paths:
      - '.github/**'
      - 'tests/fixtures/workflow-lint/**'
  push:
    branches: [main]
    paths:
      - '.github/**'
      - 'tests/fixtures/workflow-lint/**'

# Default-deny at the workflow level; each job opts in explicitly.
permissions: {}

# Cancel superseded in-flight runs on the same ref for PR pushes; never
# cancels main-branch runs. Saves CI minutes — the final PR push still
# has to pass before merge.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  # ---------------------------------------------------------------------------
  # zizmor — security-focused workflow analyzer. The official
  # `zizmorcore/zizmor-action` wrapper pins the zizmor binary by version
  # string and emits SARIF for the Security tab.
  #
  # Local reproduction (zizmor on PATH):
  #   zizmor .github/workflows/
  # ---------------------------------------------------------------------------
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run zizmor (production workflows)
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          # Restrict the scan to actual workflow files. The synthetic
          # fixture under `tests/fixtures/workflow-lint/` is scanned
          # separately by the `zizmor-fixture` job below.
          inputs: .github/workflows/
          # Pin the zizmor binary version. `latest` is the action's
          # default but would let the analyzer's behavior drift between
          # PRs; pinning here makes the lint deterministic.
          version: "1.24.1"
          # `advanced-security: true` makes the action emit SARIF and
          # upload it to GitHub code scanning under `category: zizmor`.
          advanced-security: true
          # Fail the job at Medium severity and above. Informational
          # / Low findings are uploaded to the Security tab for triage
          # but do not block merges — the noise floor on those is
          # high enough that they're better reviewed asynchronously.
          # Synthetic-failure coverage for the canonical pwn-request
          # pattern lives in the `zizmor-fixture` job below; that job
          # uses `--persona auditor` (broadest rule set) so it catches
          # the pattern regardless of this severity floor.
          min-severity: medium

  # ---------------------------------------------------------------------------
  # zizmor — synthetic-failure round-trip.
  #
  # Asserts that zizmor catches an intentionally-vulnerable workflow
  # file at `tests/fixtures/workflow-lint/insecure_pull_request_target.yml`.
  # The fixture combines `pull_request_target` (which runs in the
  # base-repo context with read-write secrets) with a checkout of the
  # PR head ref — the canonical "pwn request" anti-pattern that zizmor
  # exists to catch.
  #
  # The fixture lives OUTSIDE `.github/workflows/` so GitHub doesn't
  # actually schedule it. If this job ever passes without finding
  # anything, the upstream `template-injection` / `dangerous-triggers`
  # rules have regressed and we need to know.
  # ---------------------------------------------------------------------------
  zizmor-fixture:
    name: zizmor synthetic-failure round-trip
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Install zizmor
        # zizmor ships platform wheels on PyPI that bundle the Rust
        # binary; `pip install` puts `zizmor` on PATH. Pinning the
        # version locks the analyzer's behavior to match the
        # `zizmor-action` invocation in the primary job above.
        run: |
          set -euo pipefail
          python3 -m pip install --user "zizmor==1.24.1"
          # Surface the binary location so failures are easier to debug.
          USER_BASE="$(python3 -m site --user-base)"
          echo "user-base: $USER_BASE"
          export PATH="$USER_BASE/bin:$PATH"
          echo "$USER_BASE/bin" >> "$GITHUB_PATH"
          zizmor --version
      - name: Run zizmor against the fixture (expect non-zero exit + findings)
        run: |
          set -euo pipefail
          FIXTURE="tests/fixtures/workflow-lint/insecure_pull_request_target.yml"
          OUT="zizmor-fixture.json"

          # `--format json` emits a stable schema with one object per
          # finding; we count results to assert at least one fired.
          # `--offline` (a.k.a. no-online-audits) keeps the round-trip
          # offline so the job doesn't depend on external services and
          # stays fast.
          # `--persona auditor` widens the rule set to the broadest
          # zizmor persona so the canonical pwn-request pattern is
          # caught regardless of confidence-tier defaults.
          # Capture the exit code without tripping `set -e`.
          set +e
          zizmor \
            --format json \
            --offline \
            --persona auditor \
            "$FIXTURE" > "$OUT"
          rc=$?
          set -e
          echo "zizmor exit code: $rc"

          findings=$(python3 -c "import json,sys; d=json.load(open(sys.argv[1])); print(len(d) if isinstance(d, list) else len(d.get('findings', [])))" "$OUT")
          echo "zizmor findings: $findings"

          if [ "$rc" -eq 0 ]; then
            echo "::error::zizmor exited 0 on the synthetic insecure fixture; the round-trip is broken."
            exit 1
          fi
          if [ "$findings" -lt 1 ]; then
            echo "::error::zizmor reported $findings finding(s) on the synthetic insecure fixture; expected at least 1."
            cat "$OUT"
            exit 1
          fi
          echo "zizmor caught the synthetic pull_request_target + head-ref checkout anti-pattern."

  # ---------------------------------------------------------------------------
  # actionlint — workflow syntax + shell-script linter. Complements
  # zizmor: actionlint targets correctness (typos in expressions, bad
  # `runs-on` strings, shellcheck on inline `run:` blocks), zizmor
  # targets security.
  #
  # Local reproduction (actionlint on PATH):
  #   actionlint .github/workflows/*.yml
  # ---------------------------------------------------------------------------
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2
        with:
          files: '.github/workflows/*.yml'

  # ---------------------------------------------------------------------------
  # security-agent-config — validates the auto-remediation policy
  # declarations are well-formed.
  #
  # Two checks:
  #
  #   1. `.github/security-agent/guardrails.yaml` parses cleanly and
  #      encodes every one of the six clauses (a)-(f) from C.5 T4.
  #   2. The PR template directory-form migration is complete:
  #      the legacy single-file `.github/PULL_REQUEST_TEMPLATE.md` is
  #      absent, `default.md` is present with the M0.1 T9 content, and
  #      `security-auto-remediation.md` is present with all required
  #      section headers.
  #
  # Both checks are pure config validation — no network, no toolchain
  # install beyond the runner's pre-installed `python3` (with PyYAML
  # via the system Python; PyYAML ships on ubuntu-latest by default).
  #
  # This job is intentionally part of `Workflow lint` (not a separate
  # workflow) because the audit surface is the same: "the project's
  # config files are well-formed and consistent". Adding a new
  # workflow per validation test would fragment the gate; folding
  # into `workflow-lint.yml` keeps a single CI surface for "is the
  # repository's automation config sane?".
  # ---------------------------------------------------------------------------
  security-agent-config:
    name: security-agent config validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate guardrails.yaml schema and clauses
        shell: bash
        run: bash scripts/test-guardrails-yaml.sh

      - name: Validate PR template directory-form migration
        shell: bash
        run: bash scripts/test-pr-template-migration.sh

      - name: Validate perf-gate comparison logic
        shell: bash
        run: bash scripts/test-perf-gate-logic.sh

      - name: Validate DCO check logic (synthetic history fixtures)
        shell: bash
        # Exercises `scripts/check-dco.sh` — the script the `dco`
        # workflow invokes on every PR — against 7 synthetic
        # commit-history cases (all-signed PASS, one-unsigned FAIL,
        # zero-signed FAIL, empty-range PASS, email-mismatch FAIL,
        # lowercase-trailer PASS, merge-commit-skipped PASS). Folded
        # into this validation job rather than spun out as a separate
        # workflow because the audit surface is the same: "the project's
        # automation config is well-formed and behaves as declared".
        run: bash scripts/test-dco-workflow.sh

      - name: Validate parity-check harness comparison logic
        shell: bash
        # Exercises the artifact-divergence harness at
        # `crates/barista-test-fixtures/scripts/parity-check.sh` via
        # its `--compare-only` mode. Asserts byte-equal `target/`
        # trees PASS, a seeded one-byte divergence FAILs with the
        # diverging file named in the output, a missing-side
        # artifact FAILs, ignore-list paths (surefire-reports/,
        # maven-status/, *.log) are honored, and usage / env errors
        # exit with the documented codes. The full build-and-diff
        # run against the corpus is too slow + network-dependent for
        # every PR; it's a nightly job once v0.2 wires the daemon
        # path. This validation covers the load-bearing logic so the
        # M4.3 T5 acceptance contract ("`parity-check.sh` exits
        # non-zero on a seeded byte-divergence fixture and zero on
        # the matching baseline") is mechanically gated on every PR.
        run: bash scripts/test-parity-check.sh

      - name: Install actionlint + zizmor (for container + helm workflow validation)
        shell: bash
        # The container-workflow and helm-chart validators below run
        # `actionlint` and `zizmor` against the M5.1 T8 / T9 workflow
        # files. Both tools are already invoked by the `actionlint`
        # and `zizmor` jobs above, but those jobs cover the whole
        # workflow directory via the upstream actions. Wiring the
        # focused validators into this `security-agent-config` job
        # keeps them close to the other `test-*.sh` gates and lets
        # their exit codes participate in the same job summary.
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.local/bin"
          # actionlint: prebuilt binary release.
          ACTIONLINT_VERSION="1.7.7"
          TMP="$(mktemp -d)"
          curl -fsSL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            -o "${TMP}/actionlint.tar.gz"
          tar -xzf "${TMP}/actionlint.tar.gz" -C "${TMP}" actionlint
          install -m 0755 "${TMP}/actionlint" "${HOME}/.local/bin/actionlint"
          rm -rf "${TMP}"
          # zizmor: PyPI wheel ships the binary.
          python3 -m pip install --user "zizmor==1.24.1"
          USER_BASE="$(python3 -m site --user-base)"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          echo "${USER_BASE}/bin" >> "$GITHUB_PATH"

      - name: Validate container-roastery workflow file
        shell: bash
        # Exercises `scripts/test-container-workflow.sh` — the
        # focused actionlint + zizmor gate for the M5.1 T8
        # container-build workflow file. The script asserts both
        # linters exit 0 with no medium-or-higher findings.
        run: bash scripts/test-container-workflow.sh

      - name: Install Helm (for chart validation)
        # The helm-chart validator invoked below renders the chart and
        # diffs each fixture against its committed golden file. helm
        # is required for that render path; the version pin matches
        # the one in `.github/workflows/helm.yml` so the goldens
        # render identically here.
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.16.4

      - name: Validate roastery Helm chart + workflow file
        shell: bash
        # Exercises `scripts/test-helm-chart.sh` — the focused
        # `helm lint` + golden-fixture-diff + actionlint + zizmor
        # gate for the M5.1 T9 Helm chart. The script asserts
        # `helm lint` is clean, no fixture has drifted from its
        # committed golden, and `.github/workflows/helm.yml` itself
        # passes actionlint + zizmor (offline, medium-or-higher).
        run: bash scripts/test-helm-chart.sh

      - name: Validate kind-e2e workflow file + harness script
        shell: bash
        # Exercises `scripts/test-e2e-workflow.sh` — the focused
        # actionlint + zizmor + shellcheck gate for the M5.1 T10
        # kind reference-deployment workflow. The script asserts
        # `.github/workflows/e2e-kind.yml` passes actionlint and
        # zizmor (offline, medium-or-higher), and that
        # `roastery/tests/e2e/kind.sh` passes shellcheck.
        run: bash scripts/test-e2e-workflow.sh

      - name: Validate roastery container round-trip workflow file
        shell: bash
        # Exercises `scripts/test-roastery-container-workflow.sh` — the
        # focused actionlint + zizmor gate for the container round-trip
        # integration-test workflow. The script asserts
        # `.github/workflows/roastery-container-test.yml` passes
        # actionlint and zizmor (offline, medium-or-higher).
        run: bash scripts/test-roastery-container-workflow.sh

      - name: Validate release workflow file + build-release helper
        shell: bash
        # Exercises `scripts/test-release-workflow.sh` — the focused
        # actionlint + zizmor gate for the cross-platform reproducible-
        # build release workflow, plus a shellcheck of the determinism
        # helper `scripts/build-release.sh` (the script the release
        # matrix invokes per target) and the validator itself. The
        # script asserts `.github/workflows/release.yml` passes
        # actionlint and zizmor (offline, medium-or-higher) and both
        # shell scripts pass shellcheck.
        run: bash scripts/test-release-workflow.sh

      - name: Validate SBOM workflow file + SBOM scripts
        shell: bash
        # Exercises `scripts/test-sbom-workflow.sh` — the focused
        # actionlint + zizmor gate for the supply-chain SBOM workflow
        # (`.github/workflows/sbom.yml`), plus a shellcheck of the SBOM
        # generation + validation scripts (`scripts/generate-sbom.sh`,
        # `scripts/test-sbom.sh`) and the validator itself. The script
        # asserts the workflow passes actionlint and zizmor (offline,
        # medium-or-higher) and all SBOM shell scripts pass shellcheck.
        #
        # The heavyweight [T] self-test — generate the real SBOM(s) and
        # validate them with the CycloneDX CLI (the external tool), plus
        # the corrupted-fixture rejection check — runs in the dedicated
        # `SBOM` workflow (`.github/workflows/sbom.yml`) on every PR, not
        # here: it needs the Rust + JDK toolchains and the pinned
        # cyclonedx-cli download, which this config-validation job does
        # not provision.
        run: bash scripts/test-sbom-workflow.sh

      - name: Validate SPDX-header gate workflow + scripts
        shell: bash
        # Exercises `scripts/test-spdx-workflow.sh` — the focused
        # actionlint + zizmor gate for the CI workflow that hosts the
        # `spdx-headers` job (`.github/workflows/ci.yml`), plus a
        # shellcheck of the SPDX scripts (`scripts/check-spdx-headers.sh`,
        # the include/exclude source of truth + stamper; and `scripts/
        # test-spdx.sh`, the [T] self-test) and the validator itself. The
        # script asserts `ci.yml` passes actionlint and zizmor (offline,
        # medium-or-higher) and all SPDX shell scripts pass shellcheck.
        #
        # The [T] coverage self-test — that the gate accepts the stamped
        # tree and rejects a synthetic header-less first-party file — runs
        # via `scripts/test-spdx.sh`; the gate itself (`check-spdx-
        # headers.sh`) runs as the `spdx-headers` job in `ci.yml` on every
        # PR. Both are pure git + bash, so they need no toolchain here.
        run: bash scripts/test-spdx-workflow.sh
