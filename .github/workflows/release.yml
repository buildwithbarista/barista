# Release workflow skeleton.
#
# Triggered by tag pushes matching `v*`. The full reproducible-build
# pipeline (and the signing + provenance steps that ride on top of it)
# lands in later milestones; this file reserves the workflow slot and
# applies the SHA-pinning + minimal-permissions hygiene up front.
#
# Every action is pinned to a commit SHA (not a floating tag). The
# human-readable tag is recorded next to the SHA so future readers can
# audit drift. When bumping, update both the SHA and the comment.

name: Release

on:
  push:
    tags: ['v*']

# Default-deny at the workflow level; each job opts in explicitly.
# The eventual release-publishing job will need `contents: write` to
# attach artifacts to the GitHub Release; that opt-in lands with the
# build pipeline.
permissions: {}

jobs:
  build:
    name: Build release artifacts (skeleton — full reproducible pipeline lands later)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - run: echo "Release pipeline not yet implemented; see the build-pipeline tasks."
