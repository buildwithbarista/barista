# Release workflow — cross-platform reproducible builds, signed.
#
# Builds byte-reproducible release artifacts for every supported
# platform target, verifies reproducibility, and (on a `v*` tag) attaches
# the artifacts + a build manifest to a GitHub Release. Artifacts are
# signed keylessly with Sigstore cosign (`*.cosign.bundle`) and carry
# SLSA Level 3 build provenance (`*.intoto.jsonl`, via the SLSA
# generator) — both authenticate with the GitHub OIDC token (no stored
# secret). OS-native code signing (Apple codesign + notarization,
# Windows Authenticode) is deferred to a later milestone as it requires
# paid platform certificates; the cosign signatures + SLSA provenance
# give cryptographic supply-chain integrity for every artifact today.
#
# ── Triggers ──────────────────────────────────────────────────────────
#   push to `v*` tag   Full pipeline + publish to a GitHub (pre-)release.
#   pull_request /      Build + reproducibility-verify run; the publish
#   push to main        job is skipped (it is `if`-gated to tag refs).
#   workflow_dispatch   Manual run. The `dry_run` input (default true)
#                       lets the pipeline be exercised end-to-end without
#                       publishing.
#
# ── Reproducibility model ─────────────────────────────────────────────
# All determinism logic lives in `scripts/build-release.sh`, invoked once
# per target by the build matrix, so the exact bytes a maintainer can
# reproduce locally are the bytes CI ships. The script pins
# SOURCE_DATE_EPOCH (to the tagged commit's author date), disables
# incremental compilation, remaps every absolute build path out of the
# binary, strips symbols deterministically, and packages tar/zip archives
# with sorted members + normalized mtime/ownership. The `repro-verify`
# job rebuilds one target twice from clean and asserts the two binaries'
# sha256 match.
#
# ── Tagging is a gated human action ───────────────────────────────────
# Cutting `v0.1.0-rc.1` (or any release tag) is a deliberate,
# human-approved step. This workflow defines what WOULD happen on such a
# push; it does not perform the tagging. No job here creates or pushes a
# tag.
#
# ── Hygiene ───────────────────────────────────────────────────────────
# Every action is pinned to a commit SHA (not a floating tag); the
# human-readable tag is recorded next to the SHA so future readers can
# audit drift without external tools. When bumping, update both the SHA
# and the comment. `permissions: {}` is default-deny at the workflow
# level; each job opts in to the minimum it needs (`publish` and the
# SLSA `provenance` job get `contents: write`; `publish` also gets
# `id-token: write` for keyless signing). The one exception to SHA
# pinning is the SLSA generator, which MUST be referenced by version tag
# (see the `provenance` job).

name: Release

on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'crates/**'
      - 'roastery/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'scripts/build-release.sh'
      - 'scripts/test-release-workflow.sh'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build + verify only; skip publishing even on a tag.'
        type: boolean
        default: true

# Default-deny at the workflow level; each job opts in explicitly.
permissions: {}

# Each release tag / branch / PR gets its own run-to-completion group.
# Tag and main runs never cancel (they may publish); PR runs supersede.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------
  # build — one job per platform target.
  #
  # Target set (PRD D16): the four `x86_64`/`aarch64` × `linux`/`darwin`
  # combinations plus `x86_64-pc-windows-msvc`. That is FIVE targets.
  # (The plan's "6 platform binaries" prose counts the `roastery`
  # container image — published separately by `container-roastery.yml` —
  # alongside the five native binaries; there is no sixth native binary
  # for v0.1. We build exactly the enumerated native target set.)
  #
  # Runner mapping:
  #   linux  → ubuntu-latest. The native amd64 target builds directly.
  #            The aarch64 target cross-compiles using the
  #            `gcc-aarch64-linux-gnu` cross-linker (installed below) +
  #            `rustup target add` — chosen over `cross` to avoid a
  #            Docker-in-Docker dependency in the release path.
  #   darwin → macos-latest (Apple Silicon). The native arm64 target
  #            builds directly; `x86_64-apple-darwin` cross-compiles from
  #            arm64 macOS with just `rustup target add` (the Apple
  #            toolchain is natively multi-arch — no extra linker needed).
  #   windows→ windows-latest. Native msvc build.
  # ---------------------------------------------------------------------
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            # Cross-linker for the aarch64 GNU target.
            linker_pkg: gcc-aarch64-linux-gnu
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain (pinned in rust-toolchain.toml) + target
        # The pinned channel comes from `rust-toolchain.toml` (1.88.0);
        # `targets:` adds the cross target's std so a single host can emit
        # the matrix triple. Pinning the exact channel (not `stable`) is a
        # reproducibility requirement: the compiler identity is part of
        # the artifact's identity.
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-03-27
        with:
          toolchain: '1.88.0'
          targets: ${{ matrix.target }}

      - name: Set up JDK 21 (to build the bundled barback uber-JAR)
        # build-release.sh builds barback-uber.jar (reproducibly, via
        # SOURCE_DATE_EPOCH) and stages it into the artifact so the daemon
        # build path works from a binary install. `mvn` is preinstalled on
        # the GitHub-hosted runners; this provides the JDK it builds with.
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Install cross-linker (aarch64 linux only)
        if: matrix.linker_pkg != ''
        shell: bash
        # The matrix value is routed through `env:` rather than expanded
        # directly into the shell, so the `run:` body carries no `${{ }}`
        # interpolation (template-injection hygiene; matches the project's
        # workflow conventions).
        env:
          LINKER_PKG: ${{ matrix.linker_pkg }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends "$LINKER_PKG"
          # Point cargo at the cross-linker for this target. The env-var
          # name is the upper-cased, `-`→`_` target triple.
          {
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc"
          } >> "$GITHUB_ENV"

      # macOS Developer ID signing keychain. Runs on the macOS legs only;
      # gracefully no-ops (and leaves the binaries unsigned) when the Apple
      # secrets aren't configured, so forks and secret-less runs still build.
      # Windows code signing is intentionally NOT wired (kept keyless for now).
      - name: Set up macOS signing keychain
        id: signing
        if: runner.os == 'macOS'
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${CERT_P12_BASE64}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Apple signing secrets not set — macOS binaries ship unsigned (Gatekeeper will warn)."
            exit 0
          fi
          KEYCHAIN="${RUNNER_TEMP}/barista-signing.keychain-db"
          KC_PASS="$(openssl rand -base64 24)"
          CERT_PATH="${RUNNER_TEMP}/developer-id.p12"
          printf '%s' "${CERT_P12_BASE64}" | base64 --decode > "${CERT_PATH}"
          security create-keychain -p "${KC_PASS}" "${KEYCHAIN}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN}"
          security unlock-keychain -p "${KC_PASS}" "${KEYCHAIN}"
          security import "${CERT_PATH}" -k "${KEYCHAIN}" -P "${CERT_PASSWORD}" \
            -t cert -f pkcs12 -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "${KC_PASS}" "${KEYCHAIN}" >/dev/null
          # Prepend the signing keychain to the user search list (keep the rest)
          # so codesign resolves the identity.
          existing="$(security list-keychains -d user | sed 's/[[:space:]]*"//g' | tr '\n' ' ')"
          # shellcheck disable=SC2086
          security list-keychains -d user -s "${KEYCHAIN}" ${existing}
          rm -f "${CERT_PATH}"
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "::notice::macOS Developer ID keychain ready."

      - name: Build + package (deterministic)
        shell: bash
        # `scripts/build-release.sh` is the single source of determinism
        # truth (same script runs locally). It derives SOURCE_DATE_EPOCH
        # from the tagged commit, sets the remap/strip RUSTFLAGS, builds
        # `barista` + `roastery` for the target, packages the archive, and
        # writes a per-target manifest fragment under `dist/`.
        #
        # Matrix + context values are passed via `env:` (no `${{ }}` in
        # the shell body).
        env:
          BUILD_TARGET: ${{ matrix.target }}
          BUILD_GIT_SHA: ${{ github.sha }}
          # Non-empty only on a macOS leg whose signing keychain was set up;
          # build-release.sh codesigns the Mach-O binaries when this is set
          # (and `codesign` exists). Empty everywhere else → unsigned build.
          BARISTA_CODESIGN_IDENTITY: ${{ steps.signing.outputs.enabled == 'true' && secrets.APPLE_SIGNING_IDENTITY || '' }}
        run: |
          bash scripts/build-release.sh \
            --target "$BUILD_TARGET" \
            --out-dir dist \
            --git-sha "$BUILD_GIT_SHA"

      # Notarize the signed macOS binaries with Apple (App Store Connect API
      # key). notarytool accepts .zip/.dmg/.pkg, so we zip the signed Mach-O
      # binaries from the built archive; Apple registers their hashes, so the
      # binaries inside the distributed .tar.gz pass Gatekeeper online. Loose
      # CLI binaries can't be stapled, so verification is online (a one-time
      # offline first-run prompt is possible).
      - name: Notarize macOS binaries
        if: runner.os == 'macOS' && steps.signing.outputs.enabled == 'true'
        env:
          NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
          BUILD_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          KEY_P8="${RUNNER_TEMP}/notary-key.p8"
          printf '%s' "${NOTARY_KEY_P8_BASE64}" | base64 --decode > "${KEY_P8}"
          ARCHIVE="$(ls dist/barista-*-"${BUILD_TARGET}".tar.gz)"
          WORK="${RUNNER_TEMP}/notarize"
          rm -rf "${WORK}"; mkdir -p "${WORK}"
          tar xzf "${ARCHIVE}" -C "${WORK}"
          PKG_DIR="$(ls -d "${WORK}"/barista-*/)"
          ditto -c -k --keepParent "${PKG_DIR}bin" "${RUNNER_TEMP}/notarize.zip"
          xcrun notarytool submit "${RUNNER_TEMP}/notarize.zip" \
            --key "${KEY_P8}" \
            --key-id "${NOTARY_KEY_ID}" \
            --issuer "${NOTARY_ISSUER_ID}" \
            --wait --timeout 30m
          rm -f "${KEY_P8}" "${RUNNER_TEMP}/notarize.zip"
          echo "::notice::Notarized macOS binaries for ${BUILD_TARGET}."

      - name: Upload target artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # Per-target artifact name; the publish job downloads all of
          # them with a glob and flattens into a single release.
          name: release-${{ matrix.target }}
          path: |
            dist/barista-*-${{ matrix.target }}.tar.gz
            dist/barista-*-${{ matrix.target }}.zip
            dist/manifest-${{ matrix.target }}.json
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------
  # repro-verify — the byte-equal-across-builders acceptance check.
  #
  # Builds ONE target twice, from two independent clean checkouts /
  # target directories on the SAME runner OS, and asserts the two
  # `barista` binaries' sha256 are identical. For v0.1 this same-OS,
  # two-clean-builds form is the accepted fidelity level; true
  # cross-machine / cross-OS reproduction is a stretch goal tracked
  # separately. `x86_64-unknown-linux-gnu` is chosen as the canonical
  # verification target (native on the ubuntu runner, no cross-linker
  # variable in play).
  # ---------------------------------------------------------------------
  repro-verify:
    name: Reproducibility verify (build twice, diff sha256)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERIFY_TARGET: x86_64-unknown-linux-gnu
      # `github.sha` routed through job env so the `run:` bodies below
      # carry no `${{ }}` interpolation (template-injection hygiene).
      BUILD_GIT_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain (pinned) + target
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-03-27
        with:
          toolchain: '1.88.0'
          targets: x86_64-unknown-linux-gnu

      - name: Set up JDK 21 (to build the bundled barback uber-JAR)
        # The reproducibility check builds the archive twice; the bundled
        # barback-uber.jar is part of the archive, so this job needs the JDK
        # too. The jar is reproducible (outputTimestamp=SOURCE_DATE_EPOCH).
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Build A (clean target dir)
        shell: bash
        run: |
          bash scripts/build-release.sh \
            --target "$VERIFY_TARGET" \
            --out-dir dist-a \
            --target-dir target-a \
            --git-sha "$BUILD_GIT_SHA"

      - name: Build B (independent clean target dir)
        shell: bash
        run: |
          bash scripts/build-release.sh \
            --target "$VERIFY_TARGET" \
            --out-dir dist-b \
            --target-dir target-b \
            --git-sha "$BUILD_GIT_SHA"

      - name: Assert byte-identical
        shell: bash
        run: |
          set -euo pipefail
          A="target-a/${VERIFY_TARGET}/release/barista"
          B="target-b/${VERIFY_TARGET}/release/barista"
          SHA_A="$(sha256sum "$A" | awk '{print $1}')"
          SHA_B="$(sha256sum "$B" | awk '{print $1}')"
          echo "build A: $SHA_A"
          echo "build B: $SHA_B"
          if [ "$SHA_A" != "$SHA_B" ]; then
            echo "::error::reproducibility check FAILED: $SHA_A != $SHA_B"
            # Surface the first divergence to make debugging tractable.
            cmp "$A" "$B" || true
            exit 1
          fi
          # Archives must match too (the packaging step is part of the
          # reproducible surface).
          ARC_A="$(ls dist-a/barista-*-"${VERIFY_TARGET}".tar.gz)"
          ARC_B="$(ls dist-b/barista-*-"${VERIFY_TARGET}".tar.gz)"
          cmp "$ARC_A" "$ARC_B"
          echo "Reproducibility verified: binary + archive byte-identical across two independent builds."

  # ---------------------------------------------------------------------
  # publish — attach artifacts + aggregate manifest to a GitHub Release.
  #
  # GATED OFF on anything but a `v*` tag push: the `if` below means a PR
  # or a push to main never reaches this job (it is skipped, not failed).
  # A `workflow_dispatch` with `dry_run=true` (the default) also skips
  # publishing, so the pipeline can be exercised manually without
  # cutting a release. The job only runs when:
  #   * the ref is a `v*` tag, AND
  #   * (it is not a manual dry-run).
  #
  # `prerelease` is set automatically for pre-release tags
  # (`-rc.`, `-alpha.`, `-beta.`) so the rc-cohort tag publishes as a
  # GitHub pre-release.
  #
  # This is the ONLY job granted `contents: write`.
  # ---------------------------------------------------------------------
  publish:
    name: Publish GitHub release
    needs: [build, repro-verify]
    runs-on: ubuntu-latest
    # Tag-only, and never on a manual dry-run. On PR / main this whole
    # job is skipped.
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      !(github.event_name == 'workflow_dispatch' && inputs.dry_run)
    permissions:
      # `contents: write` creates the GitHub Release and uploads assets.
      # `id-token: write` lets cosign sign the release archives keylessly
      # via Sigstore (GitHub OIDC → short-lived Fulcio cert + Rekor
      # transparency-log entry); no signing secret is stored. SLSA L3
      # provenance is produced by the separate `provenance` job.
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Download all target artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          # No `name:` → download every artifact this run produced.
          # `merge-multiple` flattens the per-target artifacts into one
          # directory so the manifest fragments + archives sit together.
          path: dist
          merge-multiple: true

      - name: Assemble aggregate build manifest
        id: manifest
        shell: bash
        # Merge the per-target `manifest-<target>.json` fragments into a
        # single `barista-<version>-build-manifest.json`. The version is
        # taken from the tag (strip the leading `v`); the timestamp +
        # epoch are taken from the fragments (identical across targets by
        # construction — SOURCE_DATE_EPOCH is the tagged commit's date).
        #
        # `github.sha` is routed through `env:` (no `${{ }}` in the shell
        # body); `GITHUB_REF_NAME` is a runner-provided env var already.
        env:
          BUILD_GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST="dist/barista-${VERSION}-build-manifest.json"
          python3 - "$VERSION" "$BUILD_GIT_SHA" "$MANIFEST" dist/manifest-*.json <<'PY'
          import json, sys
          version, git_sha, out_path = sys.argv[1], sys.argv[2], sys.argv[3]
          fragments = sys.argv[4:]
          artifacts = []
          build_ts = None
          for fp in sorted(fragments):
              with open(fp) as f:
                  frag = json.load(f)
              artifacts.append(frag)
              build_ts = frag.get("build_timestamp", build_ts)
          # SOURCE_DATE_EPOCH is the integer the RFC3339 timestamp derives
          # from; recompute it from the build_timestamp for the aggregate
          # header so consumers don't have to re-parse the per-artifact
          # value.
          import calendar, time
          sde = None
          if build_ts:
              sde = calendar.timegm(time.strptime(build_ts, "%Y-%m-%dT%H:%M:%SZ"))
          manifest = {
              "schema_version": 1,
              "barista_version": version,
              "git_sha": git_sha,
              "build_timestamp": build_ts,
              "source_date_epoch": sde,
              "artifacts": sorted(artifacts, key=lambda a: a["target"]),
          }
          with open(out_path, "w") as f:
              json.dump(manifest, f, indent=2, sort_keys=True)
              f.write("\n")
          print(f"wrote {out_path} with {len(artifacts)} artifact(s)")
          PY
          echo "manifest_path=${MANIFEST}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign release archives + manifest (keyless, Sigstore)
        shell: bash
        # cosign keyless `sign-blob`: the GitHub OIDC token is exchanged
        # for a short-lived Fulcio certificate, the signature is recorded
        # in the Rekor transparency log, and everything needed to verify
        # is packed into the self-contained `*.cosign.bundle`. No secret.
        # Verify on a clean machine with:
        #   cosign verify-blob --bundle <file>.cosign.bundle \
        #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
        #     --certificate-identity-regexp '^https://github.com/buildwithbarista/barista/' \
        #     <file>
        run: |
          set -euo pipefail
          cd dist
          shopt -s nullglob
          signed=0
          for f in barista-*.tar.gz barista-*.zip barista-*-build-manifest.json; do
            cosign sign-blob --yes --bundle "${f}.cosign.bundle" "${f}"
            signed=$((signed + 1))
          done
          if [ "$signed" -eq 0 ]; then
            echo "::error::no artifacts found to sign"
            exit 1
          fi
          echo "signed ${signed} artifact(s)"

      - name: Create GitHub release (pre-release for rc/alpha/beta tags)
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          # Attach every archive + the aggregate manifest. The per-target
          # fragment files are intentionally NOT attached — they are an
          # internal assembly detail folded into the aggregate manifest.
          files: |
            dist/barista-*.tar.gz
            dist/barista-*.zip
            dist/barista-*-build-manifest.json
            dist/barista-*.cosign.bundle
          # Pre-release iff the tag carries a pre-release suffix
          # (semver build-up like `-rc.1`, `-alpha.0`, `-beta.2`). A bare
          # `v0.1.0` publishes as a full release.
          prerelease: ${{ contains(github.ref_name, '-rc.') || contains(github.ref_name, '-alpha.') || contains(github.ref_name, '-beta.') }}
          fail_on_unmatched_files: true
          # Keyless cosign signatures (`*.cosign.bundle`) are attached
          # above; SLSA L3 provenance (`*.intoto.jsonl`) is attached by
          # the `provenance` job below. OS-native code signing (Apple
          # codesign + notarization, Windows Authenticode) is the only
          # remaining signing surface — deferred to a later milestone
          # because it needs paid platform certificates.

  # ---------------------------------------------------------------------
  # provenance-subjects — collect the sha256 of every release archive
  # into the base64 "subjects" blob the SLSA generator consumes. Split
  # out from `publish` so the generator runs as its own job and so this
  # collection step needs only `contents: read`.
  #
  # Tag-only, and never on a manual dry-run — same gate as `publish`. If
  # skipped, the `provenance` job that needs it is skipped too.
  # ---------------------------------------------------------------------
  provenance-subjects:
    name: Collect SLSA subjects
    needs: [build, repro-verify]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      !(github.event_name == 'workflow_dispatch' && inputs.dry_run)
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Download all target artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          path: dist
          merge-multiple: true

      - name: Hash release archives
        id: hash
        shell: bash
        # `base64 -w0` of the `sha256sum` lines is the exact format the
        # SLSA generic generator expects as `base64-subjects`.
        run: |
          set -euo pipefail
          cd dist
          shopt -s nullglob
          files=( barista-*.tar.gz barista-*.zip )
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::no release archives found to attest"
            exit 1
          fi
          echo "hashes=$(sha256sum "${files[@]}" | base64 -w0)" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------
  # provenance — SLSA Level 3 build provenance for every release archive
  # (Workstream C.4 Task 4). Keyless: the reusable workflow signs the
  # in-toto attestation with the GitHub OIDC token via Sigstore
  # Fulcio/Rekor — no stored secret. `upload-assets: true` attaches the
  # resulting `*.intoto.jsonl` to the release for this tag. Verify with:
  #   slsa-verifier verify-artifact <archive> \
  #     --provenance-path <archive>.intoto.jsonl \
  #     --source-uri github.com/buildwithbarista/barista
  #
  # PIN EXCEPTION: the SLSA generator MUST be referenced by a semantic
  # version tag, not a commit SHA — slsa-verifier derives the trusted
  # builder identity from the tag and rejects provenance produced by a
  # SHA-pinned ref. This is the one `uses:` in the repo not SHA-pinned;
  # the zizmor `unpinned-uses` finding is suppressed inline below for
  # exactly this reason.
  # ---------------------------------------------------------------------
  provenance:
    name: SLSA L3 provenance
    needs: [provenance-subjects]
    permissions:
      actions: read # read the workflow run to build the provenance
      id-token: write # keyless signing via Sigstore Fulcio
      contents: write # attach the attestation to the release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0 # zizmor: ignore[unpinned-uses]
    with:
      base64-subjects: ${{ needs.provenance-subjects.outputs.hashes }}
      upload-assets: true
