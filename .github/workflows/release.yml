# Release workflow — cross-platform reproducible builds (unsigned).
#
# Builds byte-reproducible release artifacts for every supported
# platform target, verifies reproducibility, and (on a `v*` tag) attaches
# the artifacts + a build manifest to a GitHub Release. This is the
# UNSIGNED variant: code signing / notarization, SLSA provenance, and
# SBOM generation layer on top in later milestones (see the
# "SIGNING / PROVENANCE HOOK" markers below). They consume the artifacts
# and the per-artifact sha256 this pipeline produces; nothing here needs
# to change when they land.
#
# ── Triggers ──────────────────────────────────────────────────────────
#   push to `v*` tag   Full pipeline + publish to a GitHub (pre-)release.
#   pull_request /      Build + reproducibility-verify run; the publish
#   push to main        job is skipped (it is `if`-gated to tag refs).
#   workflow_dispatch   Manual run. The `dry_run` input (default true)
#                       lets the pipeline be exercised end-to-end without
#                       publishing.
#
# ── Reproducibility model ─────────────────────────────────────────────
# All determinism logic lives in `scripts/build-release.sh`, invoked once
# per target by the build matrix, so the exact bytes a maintainer can
# reproduce locally are the bytes CI ships. The script pins
# SOURCE_DATE_EPOCH (to the tagged commit's author date), disables
# incremental compilation, remaps every absolute build path out of the
# binary, strips symbols deterministically, and packages tar/zip archives
# with sorted members + normalized mtime/ownership. The `repro-verify`
# job rebuilds one target twice from clean and asserts the two binaries'
# sha256 match.
#
# ── Tagging is a gated human action ───────────────────────────────────
# Cutting `v0.1.0-rc.1` (or any release tag) is a deliberate,
# human-approved step. This workflow defines what WOULD happen on such a
# push; it does not perform the tagging. No job here creates or pushes a
# tag.
#
# ── Hygiene ───────────────────────────────────────────────────────────
# Every action is pinned to a commit SHA (not a floating tag); the
# human-readable tag is recorded next to the SHA so future readers can
# audit drift without external tools. When bumping, update both the SHA
# and the comment. `permissions: {}` is default-deny at the workflow
# level; each job opts in to the minimum it needs (only `publish` gets
# `contents: write`).

name: Release

on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'crates/**'
      - 'roastery/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'scripts/build-release.sh'
      - 'scripts/test-release-workflow.sh'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build + verify only; skip publishing even on a tag.'
        type: boolean
        default: true

# Default-deny at the workflow level; each job opts in explicitly.
permissions: {}

# Each release tag / branch / PR gets its own run-to-completion group.
# Tag and main runs never cancel (they may publish); PR runs supersede.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------
  # build — one job per platform target.
  #
  # Target set (PRD D16): the four `x86_64`/`aarch64` × `linux`/`darwin`
  # combinations plus `x86_64-pc-windows-msvc`. That is FIVE targets.
  # (The plan's "6 platform binaries" prose counts the `roastery`
  # container image — published separately by `container-roastery.yml` —
  # alongside the five native binaries; there is no sixth native binary
  # for v0.1. We build exactly the enumerated native target set.)
  #
  # Runner mapping:
  #   linux  → ubuntu-latest. The native amd64 target builds directly.
  #            The aarch64 target cross-compiles using the
  #            `gcc-aarch64-linux-gnu` cross-linker (installed below) +
  #            `rustup target add` — chosen over `cross` to avoid a
  #            Docker-in-Docker dependency in the release path.
  #   darwin → macos-latest (Apple Silicon). The native arm64 target
  #            builds directly; `x86_64-apple-darwin` cross-compiles from
  #            arm64 macOS with just `rustup target add` (the Apple
  #            toolchain is natively multi-arch — no extra linker needed).
  #   windows→ windows-latest. Native msvc build.
  # ---------------------------------------------------------------------
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            # Cross-linker for the aarch64 GNU target.
            linker_pkg: gcc-aarch64-linux-gnu
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain (pinned in rust-toolchain.toml) + target
        # The pinned channel comes from `rust-toolchain.toml` (1.88.0);
        # `targets:` adds the cross target's std so a single host can emit
        # the matrix triple. Pinning the exact channel (not `stable`) is a
        # reproducibility requirement: the compiler identity is part of
        # the artifact's identity.
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-03-27
        with:
          toolchain: '1.88.0'
          targets: ${{ matrix.target }}

      - name: Install cross-linker (aarch64 linux only)
        if: matrix.linker_pkg != ''
        shell: bash
        # The matrix value is routed through `env:` rather than expanded
        # directly into the shell, so the `run:` body carries no `${{ }}`
        # interpolation (template-injection hygiene; matches the project's
        # workflow conventions).
        env:
          LINKER_PKG: ${{ matrix.linker_pkg }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends "$LINKER_PKG"
          # Point cargo at the cross-linker for this target. The env-var
          # name is the upper-cased, `-`→`_` target triple.
          {
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc"
          } >> "$GITHUB_ENV"

      - name: Build + package (deterministic)
        shell: bash
        # `scripts/build-release.sh` is the single source of determinism
        # truth (same script runs locally). It derives SOURCE_DATE_EPOCH
        # from the tagged commit, sets the remap/strip RUSTFLAGS, builds
        # `barista` + `roastery` for the target, packages the archive, and
        # writes a per-target manifest fragment under `dist/`.
        #
        # Matrix + context values are passed via `env:` (no `${{ }}` in
        # the shell body).
        env:
          BUILD_TARGET: ${{ matrix.target }}
          BUILD_GIT_SHA: ${{ github.sha }}
        run: |
          bash scripts/build-release.sh \
            --target "$BUILD_TARGET" \
            --out-dir dist \
            --git-sha "$BUILD_GIT_SHA"

      - name: Upload target artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # Per-target artifact name; the publish job downloads all of
          # them with a glob and flattens into a single release.
          name: release-${{ matrix.target }}
          path: |
            dist/barista-*-${{ matrix.target }}.tar.gz
            dist/barista-*-${{ matrix.target }}.zip
            dist/manifest-${{ matrix.target }}.json
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------
  # repro-verify — the byte-equal-across-builders acceptance check.
  #
  # Builds ONE target twice, from two independent clean checkouts /
  # target directories on the SAME runner OS, and asserts the two
  # `barista` binaries' sha256 are identical. For v0.1 this same-OS,
  # two-clean-builds form is the accepted fidelity level; true
  # cross-machine / cross-OS reproduction is a stretch goal tracked
  # separately. `x86_64-unknown-linux-gnu` is chosen as the canonical
  # verification target (native on the ubuntu runner, no cross-linker
  # variable in play).
  # ---------------------------------------------------------------------
  repro-verify:
    name: Reproducibility verify (build twice, diff sha256)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERIFY_TARGET: x86_64-unknown-linux-gnu
      # `github.sha` routed through job env so the `run:` bodies below
      # carry no `${{ }}` interpolation (template-injection hygiene).
      BUILD_GIT_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain (pinned) + target
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-03-27
        with:
          toolchain: '1.88.0'
          targets: x86_64-unknown-linux-gnu

      - name: Build A (clean target dir)
        shell: bash
        run: |
          bash scripts/build-release.sh \
            --target "$VERIFY_TARGET" \
            --out-dir dist-a \
            --target-dir target-a \
            --git-sha "$BUILD_GIT_SHA"

      - name: Build B (independent clean target dir)
        shell: bash
        run: |
          bash scripts/build-release.sh \
            --target "$VERIFY_TARGET" \
            --out-dir dist-b \
            --target-dir target-b \
            --git-sha "$BUILD_GIT_SHA"

      - name: Assert byte-identical
        shell: bash
        run: |
          set -euo pipefail
          A="target-a/${VERIFY_TARGET}/release/barista"
          B="target-b/${VERIFY_TARGET}/release/barista"
          SHA_A="$(sha256sum "$A" | awk '{print $1}')"
          SHA_B="$(sha256sum "$B" | awk '{print $1}')"
          echo "build A: $SHA_A"
          echo "build B: $SHA_B"
          if [ "$SHA_A" != "$SHA_B" ]; then
            echo "::error::reproducibility check FAILED: $SHA_A != $SHA_B"
            # Surface the first divergence to make debugging tractable.
            cmp "$A" "$B" || true
            exit 1
          fi
          # Archives must match too (the packaging step is part of the
          # reproducible surface).
          ARC_A="$(ls dist-a/barista-*-"${VERIFY_TARGET}".tar.gz)"
          ARC_B="$(ls dist-b/barista-*-"${VERIFY_TARGET}".tar.gz)"
          cmp "$ARC_A" "$ARC_B"
          echo "Reproducibility verified: binary + archive byte-identical across two independent builds."

  # ---------------------------------------------------------------------
  # publish — attach artifacts + aggregate manifest to a GitHub Release.
  #
  # GATED OFF on anything but a `v*` tag push: the `if` below means a PR
  # or a push to main never reaches this job (it is skipped, not failed).
  # A `workflow_dispatch` with `dry_run=true` (the default) also skips
  # publishing, so the pipeline can be exercised manually without
  # cutting a release. The job only runs when:
  #   * the ref is a `v*` tag, AND
  #   * (it is not a manual dry-run).
  #
  # `prerelease` is set automatically for pre-release tags
  # (`-rc.`, `-alpha.`, `-beta.`) so the rc-cohort tag publishes as a
  # GitHub pre-release.
  #
  # This is the ONLY job granted `contents: write`.
  # ---------------------------------------------------------------------
  publish:
    name: Publish GitHub release
    needs: [build, repro-verify]
    runs-on: ubuntu-latest
    # Tag-only, and never on a manual dry-run. On PR / main this whole
    # job is skipped.
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      !(github.event_name == 'workflow_dispatch' && inputs.dry_run)
    permissions:
      # The only write grant in this workflow — needed to create the
      # GitHub Release and upload assets to it.
      #
      # SIGNING / PROVENANCE HOOK (later milestones): SLSA provenance
      # attestation will additionally need `id-token: write` and
      # `attestations: write` here; signing key material arrives via
      # secrets, not permissions. They are intentionally NOT granted in
      # this unsigned variant so the permission surface stays minimal.
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Download all target artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          # No `name:` → download every artifact this run produced.
          # `merge-multiple` flattens the per-target artifacts into one
          # directory so the manifest fragments + archives sit together.
          path: dist
          merge-multiple: true

      - name: Assemble aggregate build manifest
        id: manifest
        shell: bash
        # Merge the per-target `manifest-<target>.json` fragments into a
        # single `barista-<version>-build-manifest.json`. The version is
        # taken from the tag (strip the leading `v`); the timestamp +
        # epoch are taken from the fragments (identical across targets by
        # construction — SOURCE_DATE_EPOCH is the tagged commit's date).
        #
        # `github.sha` is routed through `env:` (no `${{ }}` in the shell
        # body); `GITHUB_REF_NAME` is a runner-provided env var already.
        env:
          BUILD_GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST="dist/barista-${VERSION}-build-manifest.json"
          python3 - "$VERSION" "$BUILD_GIT_SHA" "$MANIFEST" dist/manifest-*.json <<'PY'
          import json, sys
          version, git_sha, out_path = sys.argv[1], sys.argv[2], sys.argv[3]
          fragments = sys.argv[4:]
          artifacts = []
          build_ts = None
          for fp in sorted(fragments):
              with open(fp) as f:
                  frag = json.load(f)
              artifacts.append(frag)
              build_ts = frag.get("build_timestamp", build_ts)
          # SOURCE_DATE_EPOCH is the integer the RFC3339 timestamp derives
          # from; recompute it from the build_timestamp for the aggregate
          # header so consumers don't have to re-parse the per-artifact
          # value.
          import calendar, time
          sde = None
          if build_ts:
              sde = calendar.timegm(time.strptime(build_ts, "%Y-%m-%dT%H:%M:%SZ"))
          manifest = {
              "schema_version": 1,
              "barista_version": version,
              "git_sha": git_sha,
              "build_timestamp": build_ts,
              "source_date_epoch": sde,
              "artifacts": sorted(artifacts, key=lambda a: a["target"]),
          }
          with open(out_path, "w") as f:
              json.dump(manifest, f, indent=2, sort_keys=True)
              f.write("\n")
          print(f"wrote {out_path} with {len(artifacts)} artifact(s)")
          PY
          echo "manifest_path=${MANIFEST}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release (pre-release for rc/alpha/beta tags)
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          # Attach every archive + the aggregate manifest. The per-target
          # fragment files are intentionally NOT attached — they are an
          # internal assembly detail folded into the aggregate manifest.
          files: |
            dist/barista-*.tar.gz
            dist/barista-*.zip
            dist/barista-*-build-manifest.json
          # Pre-release iff the tag carries a pre-release suffix
          # (semver build-up like `-rc.1`, `-alpha.0`, `-beta.2`). A bare
          # `v0.1.0` publishes as a full release.
          prerelease: ${{ contains(github.ref_name, '-rc.') || contains(github.ref_name, '-alpha.') || contains(github.ref_name, '-beta.') }}
          fail_on_unmatched_files: true
          # SIGNING / PROVENANCE HOOK (later milestones): detached
          # signatures (`*.sig` / `*.minisig`), notarized macOS bundles,
          # and SLSA provenance attestations get added to `files:` here
          # once those milestones land. The unsigned variant ships the
          # archives + manifest only.
