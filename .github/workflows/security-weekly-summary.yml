# Security weekly summary.
#
# Once a week, open a fresh GitHub issue summarizing the health of
# the security program: open findings by severity, age of the oldest
# open finding, auto-remediation PR success rate over the past seven
# days, and the week-over-week delta against the previous summary.
#
# The summary is generated by `.github/scripts/security_weekly_summary.py`
# (pure stdlib + the `gh` CLI; no third-party deps). The script keys
# off the `security-bot` label that
# `.github/scripts/security_finding_to_issue.py` applies to every
# finding-issue — so this workflow's value-add is *cadence* and
# *rollup*, not *new* data collection.
#
# Older weekly-summary issues older than the retention window
# (default 6 weeks) are closed with a "superseded" comment so the
# Issues view stays tidy.
#
# Triggers:
#   - schedule: Mondays 13:00 UTC (mid-business-hours US, off-the-hour
#                to dodge the GitHub cron storm).
#   - workflow_dispatch: manual re-run.
#
# Every action is pinned to a commit SHA. The human-readable tag is
# recorded next to the SHA; bump both together.

name: Security weekly summary

on:
  schedule:
    # Monday 13:00 UTC. The day-of-week is fixed so the report
    # cadence is predictable; the time is mid-business-hours in the
    # US so a freshly-opened summary surfaces during a workday.
    - cron: "0 13 * * MON"
  workflow_dispatch:

# Default-deny at the workflow level; each job opts in explicitly.
permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:

  summarize:
    name: Generate weekly security summary
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      # The auto-remediation agent's PR author identity. Defaulting
      # to `github-actions[bot]` matches the current workflow surface
      # (C.5 T2's auto-remediate runs under the default token); when
      # C.5 T4's GitHub App identity lands, override this here.
      REMEDIATION_BOT_LOGIN: "github-actions[bot]"
      # Older summaries this many weeks back get closed. Six weeks
      # is enough scroll-back for trend reads without keeping a long
      # tail of stale issues open.
      WEEKLY_SUMMARY_RETENTION_WEEKS: "6"
    steps:
      - name: Checkout (script only)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Run weekly-summary script
        run: |
          set -euo pipefail
          python3 .github/scripts/security_weekly_summary.py
