# Secret scanning — gitleaks + trufflehog defense-in-depth.
#
# Runs two overlapping secret scanners on every PR, every push to `main`,
# and on a nightly schedule. Overlap is intentional: gitleaks is regex-driven
# (catches anything that *looks* like a credential, plus generic high-entropy
# strings); trufflehog has live verifiers (can confirm a credential by
# attempting to use it against the issuing service). The two disagree on a
# non-trivial subset and the union catches more than either alone.
#
# Coverage matrix:
#   - PRs                — both scanners scan the diff (gitleaks via the
#                          action's PR mode; trufflehog via BASE..HEAD).
#   - push: main         — both scanners scan recent commits.
#   - schedule (nightly) — both scanners scan the full git history.
#
# Findings are uploaded to GitHub code scanning as SARIF (categories
# `gitleaks` and `trufflehog`) so the Security tab groups them cleanly.
# Failures here block merges to `main`.
#
# Local reproduction (matches the gitleaks job):
#   gitleaks detect --config=.gitleaks.toml --redact --report-format=sarif \
#                   --report-path=results.sarif
#
# Every action is pinned to a commit SHA (not a floating tag). The
# human-readable tag is recorded next to the SHA so future readers can
# audit drift without external tools. When bumping, update both the SHA
# and the comment.

name: Secret scan — gitleaks + trufflehog

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # 04:19 UTC daily. Offset from sca.yml's 04:17 so the two security
    # workflows don't contend for runners, and off-the-hour to dodge the
    # top-of-hour cron storm on GitHub's shared schedulers.
    - cron: "19 4 * * *"

# Default-deny at the workflow level; each job opts in explicitly.
permissions: {}

# A new push to a PR cancels in-flight runs of the same invocation. Saves
# CI minutes without weakening the gate — the final push to a PR still has
# to pass.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # gitleaks — regex-driven secret scanner. Uses the repo's .gitleaks.toml
  # (which extends the upstream default rule pack) and honors fingerprint
  # waivers in .gitleaksignore.
  #
  # Behavior by event:
  #   - pull_request — scans only PR commits (action default).
  #   - push: main   — scans recent commits (action default).
  #   - schedule     — scans full history (action default for `schedule`).
  #
  # Implementation note: we run the free, open-source gitleaks CLI binary
  # directly rather than the `gitleaks/gitleaks-action` wrapper. The wrapper
  # requires a paid `GITLEAKS_LICENSE` for organization-owned repos (it hard-
  # fails with "missing gitleaks license" otherwise); the CLI has no such
  # restriction and matches the local-repro command documented above.
  # ---------------------------------------------------------------------------
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Full history so `schedule` and `push: main` runs can scan the
          # entire repo, not just the most recent commit.
          fetch-depth: 0
          persist-credentials: false

      - name: Install gitleaks CLI
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP" gitleaks
          "$RUNNER_TEMP/gitleaks" version

      - name: Run gitleaks (CLI)
        # Scans the commit range appropriate to the event; honors
        # .gitleaks.toml (rules) and .gitleaksignore (fingerprint waivers,
        # auto-discovered at the repo root). Writes results.sarif and exits
        # non-zero on any finding (the gate).
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_AFTER_SHA: ${{ github.event.after }}
        run: |
          set -euo pipefail
          ARGS=(detect --source . --config .gitleaks.toml --redact \
                --report-format sarif --report-path results.sarif)
          case "$GH_EVENT_NAME" in
            pull_request)
              ARGS+=(--log-opts="--no-merges ${PR_BASE_SHA}..${PR_HEAD_SHA}")
              ;;
            push)
              # Skip the range on the first push (before == all-zeros) so the
              # full history is scanned; otherwise scan before..after.
              if [ "$PUSH_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
                ARGS+=(--log-opts="--no-merges ${PUSH_BEFORE_SHA}..${PUSH_AFTER_SHA}")
              fi
              ;;
            *)
              : # schedule / workflow_dispatch — full history (no --log-opts)
              ;;
          esac
          "$RUNNER_TEMP/gitleaks" "${ARGS[@]}"

      - name: Upload SARIF to code scanning
        # Always upload, even if the gitleaks step failed (i.e., it found
        # something), so reviewers can inspect the findings in the
        # Security tab. The action writes results.sarif at the repo root.
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@7fd177fa680c9881b53cdab4d346d32574c9f7f4 # v3.35.4
        with:
          sarif_file: results.sarif
          category: gitleaks

  # ---------------------------------------------------------------------------
  # trufflehog — verifier-driven secret scanner. The headline option here is
  # `--only-verified`: trufflehog will attempt to use each candidate credential
  # against its issuer (AWS STS, GitHub, Stripe, etc.) and only fail the job
  # on credentials that *actually work*. This is the central design choice —
  # it's why we run trufflehog alongside gitleaks despite the overlap.
  #
  # Behavior by event:
  #   - pull_request — scans BASE..HEAD (action wires this automatically).
  #   - push: main   — scans since the previous push commit (action default).
  #   - schedule     — scans full history (BASE/HEAD unset).
  #
  # Note on SARIF: trufflehog has no native SARIF emitter. The action above
  # is the gate (exits non-zero on verified findings). A second step
  # invokes the trufflehog CLI directly with `--json` and converts the
  # results into a minimal SARIF document for upload to code scanning. The
  # CLI version is pinned to match the action.
  # ---------------------------------------------------------------------------
  trufflehog:
    name: trufflehog
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      # Pinned trufflehog CLI version used by BOTH the gate (via the action)
      # and the SARIF-producing follow-up step so the two cannot drift.
      TRUFFLEHOG_VERSION: "3.95.3"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Full history so `schedule` runs scan everything and so the
          # PR-mode BASE..HEAD diff has both endpoints available locally.
          fetch-depth: 0
          persist-credentials: false

      - name: Run trufflehog (gate — verified-only)
        # The action picks BASE/HEAD automatically based on the event:
        #   pull_request → github.event.pull_request.base.sha..head.sha
        #   push         → github.event.before..after
        #   schedule     → unset (full-history scan)
        # `extra_args: --only-verified` is the heart of this job; it
        # excludes regex-only matches and only fails on credentials
        # trufflehog could actually authenticate with.
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          extra_args: --only-verified
          version: ${{ env.TRUFFLEHOG_VERSION }}

      - name: Install trufflehog CLI (for SARIF emission)
        # The official action runs trufflehog inside a docker container and
        # discards its output; to produce a SARIF file we run the binary
        # directly. `if: always()` so SARIF is emitted even when the gate
        # step failed (i.e., a verified secret was found).
        if: always()
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/bin" "v${TRUFFLEHOG_VERSION}"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run trufflehog (JSON → SARIF)
        if: always()
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_AFTER_SHA: ${{ github.event.after }}
        run: |
          set -euo pipefail

          # Mirror the action's event-aware BASE/HEAD selection so the
          # SARIF reflects the same commit range the gate scanned.
          case "$GH_EVENT_NAME" in
            pull_request)
              SCAN_ARGS=(git "file://$(pwd)" \
                          --since-commit "$PR_BASE_SHA" \
                          --branch "$PR_HEAD_SHA")
              ;;
            push)
              if [ "$PUSH_BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
                SCAN_ARGS=(git "file://$(pwd)")
              else
                SCAN_ARGS=(git "file://$(pwd)" \
                            --since-commit "$PUSH_BEFORE_SHA" \
                            --branch "$PUSH_AFTER_SHA")
              fi
              ;;
            *)
              # schedule / workflow_dispatch — full history.
              SCAN_ARGS=(git "file://$(pwd)")
              ;;
          esac

          # `--no-fail`: this run is for emitting SARIF only; the gate
          # step above already failed the job on verified findings.
          trufflehog "${SCAN_ARGS[@]}" \
            --only-verified \
            --json \
            --no-update \
            --no-fail \
            > trufflehog-results.json || true

          # Minimal but valid SARIF 2.1.0 document. One result per
          # detected secret with location set to the commit + file:line
          # where trufflehog reported it. The schema is intentionally
          # small — enough for the Security tab to render entries with
          # links back to source.
          python3 - <<'PY'
          import json
          import os
          import pathlib

          results = []
          rules = {}
          path = pathlib.Path("trufflehog-results.json")
          if path.exists() and path.stat().st_size > 0:
              for line in path.read_text().splitlines():
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      r = json.loads(line)
                  except json.JSONDecodeError:
                      continue
                  detector = r.get("DetectorName") or "trufflehog-unknown"
                  meta = (r.get("SourceMetadata") or {}).get("Data", {})
                  git_meta = meta.get("Git") or {}
                  filename = git_meta.get("file") or "(unknown)"
                  line_no = int(git_meta.get("line") or 1)
                  commit = git_meta.get("commit") or ""
                  rule_id = f"trufflehog/{detector}"
                  rules.setdefault(rule_id, {
                      "id": rule_id,
                      "name": detector,
                      "shortDescription": {
                          "text": f"Verified secret detected by trufflehog ({detector})"
                      },
                      "defaultConfiguration": {"level": "error"},
                  })
                  results.append({
                      "ruleId": rule_id,
                      "level": "error",
                      "message": {
                          "text": (
                              f"trufflehog detector '{detector}' verified a secret "
                              f"at {filename}:{line_no}"
                              + (f" (commit {commit[:8]})" if commit else "")
                          )
                      },
                      "locations": [{
                          "physicalLocation": {
                              "artifactLocation": {"uri": filename},
                              "region": {"startLine": max(line_no, 1)},
                          }
                      }],
                      "partialFingerprints": (
                          {"commitSha": commit} if commit else {}
                      ),
                  })

          sarif = {
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
              "version": "2.1.0",
              "runs": [{
                  "tool": {
                      "driver": {
                          "name": "trufflehog",
                          "informationUri": "https://github.com/trufflesecurity/trufflehog",
                          "version": os.environ["TRUFFLEHOG_VERSION"],
                          "rules": list(rules.values()),
                      }
                  },
                  "results": results,
              }],
          }
          pathlib.Path("trufflehog-results.sarif").write_text(json.dumps(sarif))
          print(f"Wrote SARIF with {len(results)} result(s) and {len(rules)} rule(s).")
          PY

      - name: Upload SARIF to code scanning
        if: always() && hashFiles('trufflehog-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@7fd177fa680c9881b53cdab4d346d32574c9f7f4 # v3.35.4
        with:
          sarif_file: trufflehog-results.sarif
          category: trufflehog
