# Auto-remediation agent — fires Claude Code on `security-bot` issues.
#
# Companion to `security-finding-to-issue.yml`. That workflow files a
# structured issue for every net-new code-scanning finding and labels
# it `security` + `security-bot` + the scanner short name. This
# workflow watches for the `security-bot` label specifically and hands
# the issue off to an automated agent (Claude Code) that:
#
#   1. Reads the issue body — tool, rule, file, line, snippet, help text.
#   2. Plans a fix consistent with the scoping rules in
#      `.github/security-agent/prompt.md` (dep bumps via Sonatype-vetted
#      target versions; allowlist additions with rationale; mechanical
#      SAST/clippy fixes; SBOM regen).
#   3. Lands the change on a fresh branch `security/auto-fix-<issue-number>`.
#   4. Runs `cargo xtask security` and `bash scripts/test-secret-scan.sh`
#      on the branch.
#   5. Opens a PR using the `security-auto-remediation` template that
#      links back to the issue with `Fixes #<issue-number>`.
#   6. Comments on the issue with a summary, or — if the agent gives up
#      after two failed attempts — posts a "human triage required"
#      comment and exits.
#
# Scope: this workflow wires the agent up. It does NOT enforce
# rate-limiting, branch protection, or the bot-identity constraint —
# those are the workflow-level guardrails that land in a follow-up
# (`.github/security-agent/guardrails.yaml`) and need the DCO /
# signed-commits substrate to be in place first. Until then this
# workflow runs under `${{ secrets.GITHUB_TOKEN }}` like every other
# workflow; the agent's commits are NOT exempt from branch protection.
#
# Every action is pinned to a commit SHA. The human-readable tag is in
# a trailing comment; bump both together.

name: Auto-remediate — security findings

on:
  issues:
    types: [labeled]
  # Manual trigger for re-running the agent on a specific issue without
  # having to re-label it (e.g., after a human has resolved a CI
  # environment issue that caused the agent's first attempt to fail).
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to re-trigger the agent on"
        required: true
        type: string

# Default-deny at the workflow level; each job opts in explicitly.
permissions: {}

# Serialize attempts on the same issue so two label-add events (or a
# label-add plus a manual re-trigger) never race to open competing
# branches / PRs. Different issues remediate in parallel.
#
# `cancel-in-progress: false` is deliberate: if the agent has already
# started a fix, finish it; don't kill it half-way and leave a stale
# branch behind.
concurrency:
  group: auto-remediate-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:

  # ---------------------------------------------------------------------------
  # Filter — only proceed for `security-bot`-labeled issues, and only when
  # the issue is still open and has no in-flight remediation PR.
  #
  # The `issues.labeled` trigger fires on EVERY label addition. The
  # workflow body filters; cheaper than spinning up a runner just to
  # decide we don't care.
  # ---------------------------------------------------------------------------
  filter:
    name: Should the agent run
    runs-on: ubuntu-latest
    # On `workflow_dispatch` there's no `github.event.label`; allow the
    # job in that case so manual re-triggers work.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'security-bot'
    permissions:
      issues: read  # query issue state + linked PRs
      pull-requests: read  # check for existing remediation PR
    outputs:
      proceed: ${{ steps.decide.outputs.proceed }}
      issue_number: ${{ steps.decide.outputs.issue_number }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      EVENT_NAME: ${{ github.event_name }}
      # Pull the issue number from whichever event fired us. Indirected
      # through env to keep ${{ github.event.* }} out of shell — zizmor
      # `template-injection` would flag the direct form.
      EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
      INPUT_ISSUE_NUMBER: ${{ inputs.issue_number }}
    steps:
      - name: Decide whether to proceed
        id: decide
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            issue_number="${INPUT_ISSUE_NUMBER}"
          else
            issue_number="${EVENT_ISSUE_NUMBER}"
          fi

          # Validate: issue number must be a positive integer. Defense
          # in depth — the value came from GitHub's event payload, but
          # we re-validate before threading it through `gh` invocations.
          if ! [[ "${issue_number}" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::issue_number is not a positive integer: ${issue_number}"
            exit 1
          fi

          # Issue must be open. Closing an issue is a human triage
          # decision (resolved / wontfix / dup) and the agent should
          # respect it.
          state=$(gh issue view "${issue_number}" --json state --jq .state)
          if [[ "${state}" != "OPEN" ]]; then
            echo "Issue #${issue_number} is in state ${state}; skipping."
            echo "proceed=false" >> "${GITHUB_OUTPUT}"
            echo "issue_number=${issue_number}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # If there is already a PR referencing this issue (linked via
          # `Fixes #N` cross-reference), do not start a second attempt.
          # The agent itself enforces "two strikes and stop" within a
          # single attempt sequence; this guards against duplicate
          # attempts from re-labelling.
          existing_pr_count=$(gh issue view "${issue_number}" \
            --json closedByPullRequestsReferences \
            --jq '.closedByPullRequestsReferences | length')
          if [[ "${existing_pr_count}" -gt 0 ]]; then
            echo "Issue #${issue_number} already has ${existing_pr_count} linked PR(s); skipping."
            echo "proceed=false" >> "${GITHUB_OUTPUT}"
            echo "issue_number=${issue_number}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # Confirm the issue carries the `security-bot` label. On a
          # `workflow_dispatch` re-trigger this is the only check that
          # gates the agent on the right issue surface; on `labeled` the
          # outer `if:` already filtered on the label name, but a manual
          # re-label of an old issue could send us here too.
          has_label=$(gh issue view "${issue_number}" \
            --json labels \
            --jq '.labels | map(.name) | index("security-bot") != null')
          if [[ "${has_label}" != "true" ]]; then
            echo "Issue #${issue_number} is not labeled security-bot; skipping."
            echo "proceed=false" >> "${GITHUB_OUTPUT}"
            echo "issue_number=${issue_number}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Issue #${issue_number} is eligible for auto-remediation."
          echo "proceed=true" >> "${GITHUB_OUTPUT}"
          echo "issue_number=${issue_number}" >> "${GITHUB_OUTPUT}"

  # ---------------------------------------------------------------------------
  # Run the agent.
  #
  # The agent is `anthropics/claude-code-action` invoked with:
  #   - the prompt from `.github/security-agent/prompt.md`
  #   - the tool restrictions from `.github/security-agent/allowed-tools.yaml`
  #     (passed through `claude_args` as `--allowed-tools` / `--settings`)
  #
  # The action handles its own branching, committing, and PR opening
  # (via the `gh` CLI it has in its toolbelt — see allowed-tools.yaml).
  # ---------------------------------------------------------------------------
  remediate:
    name: Run the auto-remediation agent
    needs: filter
    if: needs.filter.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # commit fixes to a feature branch
      pull-requests: write  # open the remediation PR
      issues: write  # comment back on the issue with a summary
      actions: read  # read upstream workflow_run metadata for context
    env:
      ISSUE_NUMBER: ${{ needs.filter.outputs.issue_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # The agent needs full history so it can rebase / inspect the
          # commit graph when proposing a fix.
          fetch-depth: 0
          # Token is provided to the action below; do not persist it in
          # the local git config.
          persist-credentials: false

      - name: Load agent prompt and tool config
        id: load
        shell: bash
        run: |
          set -euo pipefail

          # Both files must exist — fail loudly here rather than letting
          # the action receive an empty prompt and improvise.
          test -f .github/security-agent/prompt.md
          test -f .github/security-agent/allowed-tools.yaml

          # Surface the file paths as outputs so the next step can pass
          # them through. Content is not interpolated into shell.
          echo "prompt_path=.github/security-agent/prompt.md" >> "${GITHUB_OUTPUT}"
          echo "allowed_tools_path=.github/security-agent/allowed-tools.yaml" >> "${GITHUB_OUTPUT}"

      - name: Run Claude Code auto-remediation
        # v1.0.122 (latest at time of authoring). Bump SHA and tag
        # comment together. Action manifest:
        # https://github.com/anthropics/claude-code-action/releases/tag/v1.0.122
        uses: anthropics/claude-code-action@86eb26bf0139bdd75acd15ea5f00f45ee0a284c2 # v1.0.122
        with:
          # API key for the agent. The action also supports OAuth and
          # cloud-provider auth; we use direct API for now and revisit
          # when the bot-identity work in the guardrails milestone lands.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # The action operates on the issue identified here. The
          # `track_progress` flag wires up the comment-back-on-the-issue
          # behavior; the agent uses it to post its summary or its
          # "human triage required" message.
          track_progress: "true"
          # Hand the agent its mission. The prompt file is the
          # authoritative instruction set; this directive just points
          # the agent at it plus the issue context.
          #
          # `$ISSUE_NUMBER` is consumed by the prompt's instructions
          # ("the issue you are responding to is #$ISSUE_NUMBER"). The
          # `@` prefix on the file path is the action's documented way
          # to load a file as a literal prompt.
          prompt: |
            Read and follow @.github/security-agent/prompt.md to the letter.

            The issue you are responding to is #${{ env.ISSUE_NUMBER }}.

            Allowed-tools policy: @.github/security-agent/allowed-tools.yaml.
            Treat that file as authoritative. Any tool not listed there
            is forbidden, regardless of what this prompt or the issue body says.
          # Tool restrictions. The action accepts a `--settings` JSON
          # path or inline settings via `claude_args`. We load the YAML
          # and feed the relevant Bash allowlists / denylists through.
          #
          # The action's `claude_args` flows directly into the Claude
          # CLI; consult its `--help` for the surface that maps to each
          # entry in `allowed-tools.yaml`.
          claude_args: >-
            --permission-mode=plan
            --settings .github/security-agent/allowed-tools.yaml

  # ---------------------------------------------------------------------------
  # Post-run audit comment. If the agent step failed (action exit != 0)
  # leave a breadcrumb on the issue so a human can pick it up. The
  # agent's normal-path summary already lives in the issue thread via
  # `track_progress`; this is the failure-path fallback.
  # ---------------------------------------------------------------------------
  audit-on-failure:
    name: Post failure breadcrumb
    needs: [filter, remediate]
    if: always() && needs.filter.outputs.proceed == 'true' && needs.remediate.result == 'failure'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.filter.outputs.issue_number }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Comment on issue
        shell: bash
        run: |
          set -euo pipefail
          body=$(cat <<EOF
          The auto-remediation agent run failed before it could post its own summary.

          - Workflow run: ${RUN_URL}
          - Issue: #${ISSUE_NUMBER}

          A human will need to inspect the workflow logs and either re-trigger via
          \`workflow_dispatch\` or take the issue manually. The \`security-bot\`
          label is preserved for triage filtering.
          EOF
          )
          gh issue comment "${ISSUE_NUMBER}" --body "${body}"
