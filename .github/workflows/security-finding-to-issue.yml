# Security finding → GitHub issue.
#
# Watches every security scanner that runs on `push: main` and, after a
# scanner completes (success OR failure — code scanning surfaces findings
# even when a job exits 0 because the SARIF upload happened in an
# `if: always()` step), opens a structured GitHub issue for each net-new
# finding so it can be triaged, auto-remediated, or dismissed.
#
# Triggers:
#   - workflow_run on the security suite below, filtered to `main`.
#   - workflow_dispatch for ad-hoc runs.
#
# Source of truth: the GitHub code scanning REST API
# (`/repos/{owner}/{repo}/code-scanning/alerts`). GitHub aggregates SARIF
# uploads from every scanner under the same set of alerts; querying the
# API is simpler and more reliable than re-parsing each scanner's SARIF
# artifact, and the `category:` value from each upload survives as the
# alert's `tool.name` / `most_recent_instance.analysis_key`.
#
# Dedup: each finding gets a stable fingerprint (SHA-256 of
# `{tool, rule_id, path, start_line, snippet}`). The fingerprint is
# embedded in the issue body inside an HTML comment so the next run can
# read it back without scanning the full body text. Open AND closed
# `security-bot`-labeled issues both count as "previously seen"; closing
# an issue is treated as the human triage decision.
#
# Rate limit: at most `MAX_ISSUES_PER_RUN` new issues are opened per run
# (default 25). Findings beyond the cap are recorded in a tracker issue
# so the suppression itself is visible and a human can re-trigger.
#
# Every action is pinned to a commit SHA. The human-readable tag is in a
# trailing comment; bump both together.

name: Security finding → issue

# zizmor's `dangerous-triggers` audit flags `workflow_run` by default.
# The pwn-request pattern requires (a) running PR-controlled code in
# the base-repo context AND (b) using secrets/write tokens. This
# workflow does neither: it gates on `head_branch == 'main'` so fork
# PR runs can't trigger it, doesn't check out PR-controlled code, and
# only consumes the upstream run's metadata (id, URL, head sha) as
# data — never interpolated into shell. The trigger is the right
# shape for "another workflow finished"; we accept the audit finding.
on:  # zizmor: ignore[dangerous-triggers]
  workflow_run:
    # The upstream security suite. Adding a new security workflow that
    # uploads SARIF means appending its `name:` here. Each entry must
    # match the upstream workflow's top-level `name:` exactly.
    workflows:
      - "SCA — dependency vulnerability scanning"
      - "SCA nightly — fresh-DB dependency scan"
      - "Secret scan — gitleaks + trufflehog"
      - "SAST — static analysis"
      - "CodeQL"
      - "Workflow lint"
    types: [completed]
  # Manual trigger for re-running the issue-creation logic without
  # waiting for an upstream scan to fire. Handy after the dedup cache
  # gets out of sync or after a manual triage pass.
  workflow_dispatch:

# Default-deny at the workflow level; each job opts in explicitly.
permissions: {}

# Cancel an older in-flight run of this workflow if another scanner
# completes while we're still processing the previous batch. The
# workflow is idempotent (it always re-reads the alerts list), so
# discarding an in-flight run never loses findings.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:

  # ---------------------------------------------------------------------------
  # File issues for net-new code-scanning alerts.
  #
  # Skipped unless the upstream workflow ran on the default branch.
  # PR runs from forks would otherwise let an attacker spam the issue
  # tracker by submitting a PR that fires a scanner; gating on
  # `head_branch == main` blocks that.
  # ---------------------------------------------------------------------------
  file-issues:
    name: File issues for net-new findings
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.head_branch == 'main'
    permissions:
      contents: read  # check out the in-tree filer script
      issues: write  # create finding-issues + comment on tracker issue
      security-events: read  # query the code-scanning alerts API
      actions: read  # read upstream workflow_run metadata for provenance
    env:
      # Cap on new issues opened per run. A sudden spike beyond this is
      # consolidated into a single tracker issue rather than spamming
      # the tracker. Tune by editing here; no env-var override on
      # purpose — changes to the cap should be visible in git history.
      MAX_ISSUES_PER_RUN: "25"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      # Provenance for the issue body: which upstream run triggered us.
      UPSTREAM_WORKFLOW: ${{ github.event.workflow_run.name }}
      UPSTREAM_RUN_ID: ${{ github.event.workflow_run.id }}
      UPSTREAM_RUN_URL: ${{ github.event.workflow_run.html_url }}
      UPSTREAM_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout (workflow + filer script)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: File issues for new findings
        run: |
          set -euo pipefail
          python3 .github/scripts/security_finding_to_issue.py
