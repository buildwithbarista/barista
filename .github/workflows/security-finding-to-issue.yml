# Security finding → GitHub issue.
#
# Once a day, reads the aggregated code-scanning alert set (every scanner
# uploads SARIF into the same alerts list, even when a job exits 0 because
# the upload ran in an `if: always()` step) and opens a structured GitHub
# issue for each net-new finding so it can be triaged, auto-remediated, or
# dismissed.
#
# Triggers:
#   - schedule: once daily, after the nightly scans refresh the alerts.
#   - workflow_dispatch for ad-hoc runs.
#
# Source of truth: the GitHub code scanning REST API
# (`/repos/{owner}/{repo}/code-scanning/alerts`). GitHub aggregates SARIF
# uploads from every scanner under the same set of alerts; querying the
# API is simpler and more reliable than re-parsing each scanner's SARIF
# artifact, and the `category:` value from each upload survives as the
# alert's `tool.name` / `most_recent_instance.analysis_key`.
#
# Dedup: each finding gets a stable fingerprint (SHA-256 of
# `{tool, rule_id, path, start_line, snippet}`). The fingerprint is
# embedded in the issue body inside an HTML comment so the next run can
# read it back without scanning the full body text. Open AND closed
# `security-bot`-labeled issues both count as "previously seen"; closing
# an issue is treated as the human triage decision.
#
# Rate limit: at most `MAX_ISSUES_PER_RUN` new issues are opened per run
# (default 25). Findings beyond the cap are recorded in a tracker issue
# so the suppression itself is visible and a human can re-trigger.
#
# Every action is pinned to a commit SHA. The human-readable tag is in a
# trailing comment; bump both together.

name: Security finding → issue

on:
  # Once a day, after the nightly SCA + secret scans have refreshed the
  # code-scanning alert set. A single batched run replaces the old
  # per-scanner `workflow_run` fan-out: every scanner uploads into the
  # same code-scanning alerts list, so re-reading it once a day catches
  # every finding without spawning a redundant run on each scanner's
  # completion. Findings are filed within 24h, which is ample for an
  # async triage queue.
  schedule:
    # 05:40 UTC — comfortably after the nightly secret-scan (04:19) and
    # sca-nightly (04:37) have finished uploading SARIF, so the alert set
    # is fresh. Off-the-hour to dodge the top-of-hour cron storm. A scan
    # still running at this point just defers its findings to tomorrow's
    # run (the script is idempotent), so an exact handoff isn't required.
    - cron: "40 5 * * *"
  # Manual trigger for re-running the issue-creation logic on demand —
  # after a push that added findings, after the dedup cache gets out of
  # sync, or after a manual triage pass.
  workflow_dispatch:

# Default-deny at the workflow level; each job opts in explicitly.
permissions: {}

# Serialize runs of this workflow (e.g. a manual dispatch overlapping the
# scheduled run) so two invocations don't race to file the same finding.
# The workflow is idempotent — it always re-reads the alerts list — so
# queuing rather than cancelling never loses findings.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:

  # ---------------------------------------------------------------------------
  # File issues for net-new code-scanning alerts.
  #
  # Scheduled runs (and manual dispatches) only ever execute against the
  # default branch, so there's no fork-PR spam vector to gate against.
  # ---------------------------------------------------------------------------
  file-issues:
    name: File issues for net-new findings
    runs-on: ubuntu-latest
    permissions:
      contents: read  # check out the in-tree filer script
      issues: write  # create finding-issues + comment on tracker issue
      security-events: read  # query the code-scanning alerts API
    env:
      # Cap on new issues opened per run. A sudden spike beyond this is
      # consolidated into a single tracker issue rather than spamming
      # the tracker. Tune by editing here; no env-var override on
      # purpose — changes to the cap should be visible in git history.
      MAX_ISSUES_PER_RUN: "25"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Checkout (workflow + filer script)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: File issues for new findings
        run: |
          set -euo pipefail
          python3 .github/scripts/security_finding_to_issue.py
