# Supply-chain SBOM — generate, validate (external tool), publish.
#
# Produces CycloneDX software bills-of-materials for the Barista product
# and validates each one with the CycloneDX CLI — the required external
# validation tool. CI FAILS on an invalid SBOM.
#
# All generation + validation logic lives in `scripts/generate-sbom.sh`
# (the single source of truth, runnable locally), so "what the pipeline
# publishes" and "what a maintainer can reproduce by hand" never drift.
#
# ── Triggers ──────────────────────────────────────────────────────────
#   pull_request /      Validate-only. Generate the SBOM(s) and run the
#   push to main        external-tool validation gate; nothing is
#                       published. Gives every change that touches the
#                       dependency graph or the SBOM tooling a hard
#                       "the SBOM still generates and validates" check.
#   push to `v*` tag    Generate + validate, then ATTACH the SBOM
#                       artifacts to the GitHub (pre-)release the
#                       `release.yml` pipeline creates for the same tag.
#                       The publish job is `if`-gated to tag refs; a PR
#                       / main push never reaches it.
#   workflow_dispatch   Manual run (validate-only; never publishes).
#
# ── Aggregation model ─────────────────────────────────────────────────
# `scripts/generate-sbom.sh` emits three artifacts (manifest-style file
# names, version from `cargo metadata`):
#   barista-<version>-sbom.cdx.json        merged product SBOM (primary)
#   barista-<version>-sbom-rust.cdx.json    Rust workspace SBOM
#   barista-<version>-sbom-java.cdx.json    barback / Java SBOM
# The merged product SBOM is the primary published artifact; the
# per-language SBOMs are co-published as provenance / merge inputs.
#
# ── Relationship to release.yml ───────────────────────────────────────
# This workflow is a SIBLING of `release.yml`, not a change to it: the
# reproducible-build determinism logic in `release.yml` /
# `scripts/build-release.sh` is left untouched. On a `v*` tag both
# workflows fire; `release.yml` creates the release + uploads the
# binaries + build manifest, and this workflow's `publish` job upserts
# the SAME release by tag and appends the SBOM assets. `action-gh-release`
# adds files to an existing release without clobbering its other assets.
#
# ── Hygiene ───────────────────────────────────────────────────────────
# Every action is pinned to a commit SHA (the SHAs are shared with
# `release.yml` / `ci.yml`); the human-readable tag is recorded next to
# the SHA. `permissions: {}` is default-deny at the workflow level; each
# job opts in to the minimum it needs (only `publish` gets
# `contents: write` + `id-token: write`). Matrix / context values are routed through `env:`
# so no `run:` body carries `${{ }}` interpolation (template-injection
# hygiene).
#
# ── Tooling (build/CI only — never a runtime dependency) ──────────────
#   cargo-cyclonedx          cargo install cargo-cyclonedx --version 0.5.9
#   cyclonedx (CLI)          CycloneDX/cyclonedx-cli v0.32.0 release
#                            binary, sha256-pinned on download.
#   cyclonedx-maven-plugin   2.9.1, fetched by Maven (pinned in
#                            barback/pom.xml under the `sbom` profile).

name: SBOM

on:
  pull_request:
    paths:
      - 'crates/**'
      - 'roastery/**'
      - 'xtask/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'barback/pom.xml'
      - 'scripts/generate-sbom.sh'
      - 'scripts/test-sbom.sh'
      - 'scripts/test-sbom-workflow.sh'
      - '.github/workflows/sbom.yml'
  push:
    tags: ['v*']
    branches: [main]
  workflow_dispatch:

# Default-deny at the workflow level; each job opts in explicitly.
permissions: {}

concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------
  # sbom — generate the product SBOM + validate it with the CycloneDX
  # CLI (the external tool), then upload it as a build artifact so the
  # `publish` job can attach it to the release on a tag.
  #
  # The CLI is installed from the pinned `CycloneDX/cyclonedx-cli`
  # release; the download is sha256-verified against the pinned digest
  # so a tampered or moved asset fails the job rather than silently
  # validating with an unknown binary.
  # ---------------------------------------------------------------------
  sbom:
    name: Generate + validate SBOM
    runs-on: ubuntu-latest
    permissions:
      # Read-only: this job checks out the source and generates +
      # validates the SBOM. It never writes to the repo or the release.
      contents: read
    env:
      # CycloneDX CLI — pinned release + the linux-x64 asset's sha256.
      # When bumping CYCLONEDX_CLI_VERSION, refresh CYCLONEDX_CLI_SHA256
      # from the new release (sha256sum of cyclonedx-linux-x64).
      CYCLONEDX_CLI_VERSION: '0.32.0'
      CYCLONEDX_CLI_SHA256: '454879e6a4a405c8a13bff49b8982adcb0596f3019b26b0811c66e4d7f0783e1'
      CARGO_CYCLONEDX_VERSION: '0.5.9'
      # syft — the SPDX generator (C.4 T7 dual-format SBOMs). Pinned
      # release + the linux-amd64 tarball sha256 from the release's signed
      # checksums.txt. When bumping SYFT_VERSION, refresh SYFT_AMD64_SHA256
      # from `syft_<ver>_checksums.txt`.
      SYFT_VERSION: '1.44.0'
      SYFT_AMD64_SHA256: '0e91737aee2b5baf1d255b959630194a302335d848ff97bb07921eb6205b5f5a'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain (pinned in rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-03-27
        with:
          toolchain: '1.88.0'

      - name: Set up JDK 21 (for the barback Java SBOM)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Install cargo-cyclonedx (pinned)
        shell: bash
        run: |
          set -euo pipefail
          cargo install cargo-cyclonedx --version "$CARGO_CYCLONEDX_VERSION" --locked

      - name: Install CycloneDX CLI (pinned release, sha256-verified)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.local/bin"
          URL="https://github.com/CycloneDX/cyclonedx-cli/releases/download/v${CYCLONEDX_CLI_VERSION}/cyclonedx-linux-x64"
          curl -fsSL "$URL" -o "${HOME}/.local/bin/cyclonedx"
          echo "${CYCLONEDX_CLI_SHA256}  ${HOME}/.local/bin/cyclonedx" | sha256sum -c -
          chmod 0755 "${HOME}/.local/bin/cyclonedx"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"

      - name: Install syft (pinned release, sha256-verified)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.local/bin"
          TARBALL="syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          URL="https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/${TARBALL}"
          curl -fsSL "$URL" -o "/tmp/${TARBALL}"
          echo "${SYFT_AMD64_SHA256}  /tmp/${TARBALL}" | sha256sum -c -
          tar -xzf "/tmp/${TARBALL}" -C "${HOME}/.local/bin" syft
          chmod 0755 "${HOME}/.local/bin/syft"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"

      - name: Verify tool versions
        shell: bash
        run: |
          set -euo pipefail
          cargo cyclonedx --version
          cyclonedx --version
          syft version
          mvn -v | head -1
          java -version

      - name: Generate + validate SBOM (external-tool gate)
        shell: bash
        # `generate-sbom.sh` generates the Rust SBOM (per-crate then
        # merged), the Java SBOM (cyclonedx-maven-plugin via the `sbom`
        # profile), merges them into the product SBOM, and validates each
        # with `cyclonedx validate --fail-on-errors`. Any invalid SBOM
        # exits the script non-zero and fails this job.
        run: bash scripts/generate-sbom.sh --out-dir dist

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          # Both formats: CycloneDX (*.cdx.json) + SPDX (*.spdx.json).
          path: dist/barista-*-sbom*.json
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------
  # publish — attach the SBOM artifacts to the GitHub release.
  #
  # GATED OFF on anything but a `v*` tag push: a PR / main push never
  # reaches this job (it is skipped, not failed). On a tag, `release.yml`
  # creates the release (binaries + build manifest) and this job upserts
  # the SAME release by tag and appends the SBOM assets — `action-gh-
  # release` adds the listed files without clobbering existing assets.
  #
  # This is the ONLY job granted `contents: write`.
  # ---------------------------------------------------------------------
  publish:
    name: Attach SBOM to release
    needs: [sbom]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      # `contents: write` appends the SBOM assets to the GitHub Release
      # `release.yml` created for this tag. `id-token: write` lets cosign
      # sign the SBOM files keylessly via Sigstore (GitHub OIDC → Fulcio
      # cert + Rekor transparency log); no signing secret is stored.
      contents: write
      id-token: write
    steps:
      - name: Download SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom
          path: dist

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign SBOMs (keyless, Sigstore)
        shell: bash
        # cosign keyless `sign-blob` over each SBOM (CycloneDX + SPDX)
        # proves the SBOM was produced by this repo's release workflow. The
        # self-contained `*.cosign.bundle` verifies on a clean machine:
        #   cosign verify-blob --bundle <sbom>.cosign.bundle \
        #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
        #     --certificate-identity-regexp '^https://github.com/buildwithbarista/barista/' \
        #     <sbom>
        # (The container image additionally carries a full buildx in-toto
        # SBOM attestation; a subject-bound attestation over the release
        # binaries is awkward here since they live in a sibling run.)
        run: |
          set -euo pipefail
          cd dist
          shopt -s nullglob
          signed=0
          for f in barista-*-sbom*.json; do
            cosign sign-blob --yes --bundle "${f}.cosign.bundle" "${f}"
            signed=$((signed + 1))
          done
          if [ "$signed" -eq 0 ]; then
            echo "::error::no SBOM files found to sign"
            exit 1
          fi
          echo "signed ${signed} SBOM file(s)"

      - name: Attach SBOM + signatures to the release (pre-release for rc/alpha/beta tags)
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          # Append the SBOM artifacts + their cosign signature bundles to
          # the release the `release.yml` pipeline created for this tag.
          # Other assets (binaries, build manifest) are left untouched.
          files: |
            dist/barista-*-sbom*.json
            dist/barista-*-sbom*.json.cosign.bundle
          prerelease: ${{ contains(github.ref_name, '-rc.') || contains(github.ref_name, '-alpha.') || contains(github.ref_name, '-beta.') }}
          fail_on_unmatched_files: true
