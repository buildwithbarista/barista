# Nightly SCA — fresh-DB dependency scan.
#
# Re-runs the SCA suite (cargo-deny, cargo-audit, OSV-Scanner, OWASP
# Dependency-Check, Trivy) every night against `main` with a *fresh*
# advisory database for each scanner. The PR-time `sca.yml` workflow
# may legitimately hit cached DB state (cargo-audit's local advisory
# cache, the maven cache restored by `actions/cache`, the OSV-Scanner
# action's in-image dataset, the OWASP NVD-data cache); this workflow
# burns those caches by design so a newly-published CVE that lands
# between PRs surfaces within ~24 hours.
#
# Coverage matches `sca.yml` exactly. The split is *cadence*, not
# *content*: PR + push runs in `sca.yml` exist to gate merges; this
# workflow exists to catch findings published after the last merge.
#
# Issue-filing path: this workflow's SARIF uploads (and the
# code-scanning alerts they create) are picked up by
# `security-finding-to-issue.yml` via its `workflow_run` trigger —
# the dedup logic in `.github/scripts/security_finding_to_issue.py`
# guarantees a net-new advisory results in exactly one new issue.
# Findings already filed under `sca.yml` (same scanner, same fingerprint)
# are deduped by the existing-issues check; this workflow only opens
# new issues for *net-new* findings, which is the value-add over
# the daily `sca.yml` run.
#
# Trigger:
#   - schedule: 04:37 UTC nightly. Offset from `sca.yml`'s 04:17 (when
#                that schedule was active; now removed in favor of this
#                workflow) and `secret-scan.yml`'s 04:19 so the three
#                security workflows don't contend for shared runners.
#                Off-the-hour to dodge the GitHub cron storm.
#   - workflow_dispatch: manual re-run on demand (e.g., after a known
#                CVE drops and we want the issue filed before the next
#                nightly tick).
#
# Every action is pinned to a commit SHA (not a floating tag). The
# human-readable tag is recorded next to the SHA so future readers can
# audit drift. When bumping, update both the SHA and the comment.

name: SCA nightly — fresh-DB dependency scan

on:
  schedule:
    # 04:37 UTC nightly. Five+ minutes after sca.yml's old slot
    # (04:17) and secret-scan.yml's slot (04:19); off-the-hour to
    # dodge the top-of-hour cron storm on GitHub's shared schedulers.
    - cron: "37 4 * * *"
  workflow_dispatch:

# Default-deny at the workflow level; each job opts in explicitly.
permissions: {}

# Serialize nightly runs so two consecutive ticks (or a tick + a
# manual dispatch) can't race on the same advisory cache. Cancelling
# an in-flight run is safe: every job is idempotent and the next run
# re-scans from scratch.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:

  # ---------------------------------------------------------------------------
  # cargo-deny — advisories + bans + licenses + sources. Same config
  # as `sca.yml`; the EmbarkStudios action always fetches the latest
  # RustSec advisory DB on each run (no in-action cache to bust),
  # so a fresh-DB pass is the default behavior here.
  # ---------------------------------------------------------------------------
  cargo-deny-check:
    name: cargo-deny (fresh DB)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Run cargo-deny (gate)
        id: cargo-deny-gate
        continue-on-error: true
        uses: EmbarkStudios/cargo-deny-action@a531616d8ce3b9177443e48a1159bc945a099823 # v2.0.19
        with:
          command: check
          arguments: --all-features
      - name: Install cargo-deny CLI (for SARIF emit)
        if: always()
        run: |
          set -euo pipefail
          cargo install cargo-deny --locked --version 0.18.4
      - name: Emit cargo-deny SARIF
        if: always()
        run: |
          set -euo pipefail
          cargo deny check --format json --all-features 2> cargo-deny.json || true
          python3 .github/scripts/cargo-deny-to-sarif.py \
            < cargo-deny.json > cargo-deny.sarif
      - name: Upload cargo-deny SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: cargo-deny.sarif
          category: cargo-deny
      - name: Fail if cargo-deny gate failed
        if: steps.cargo-deny-gate.outcome == 'failure'
        run: |
          echo "::error::cargo-deny reported violations; see SARIF upload + step log."
          exit 1

  # ---------------------------------------------------------------------------
  # cargo-audit — RustSec advisory scan against Cargo.lock. The
  # `rustsec/audit-check` action fetches the advisory DB on every
  # invocation, so the nightly run picks up advisories published in
  # the last 24 hours without needing a cache-busting step.
  #
  # continue-on-error: true — soft gate matching sca.yml. The advisory-DB
  # TOML parser (RUSTSEC-2026-0076.md) and the rustsec/audit-check action
  # itself have suffered upstream breakage outside our control. cargo-deny
  # and OSV-Scanner (both hard gates in this workflow) are the authoritative
  # advisory checks; cargo-audit failures here should not abort the nightly
  # run or suppress SARIF uploads from other scanners.
  # ---------------------------------------------------------------------------
  cargo-audit-check:
    name: cargo-audit (fresh DB)
    runs-on: ubuntu-latest
    continue-on-error: true  # soft gate — upstream DB/action breakage; cargo-deny + OSV are the hard gates
    permissions:
      contents: read
      issues: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Run cargo-audit (gate)
        id: cargo-audit-gate
        continue-on-error: true
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install cargo-audit CLI (for SARIF emit)
        if: always()
        run: |
          set -euo pipefail
          cargo install cargo-audit --locked --version 0.21.2
      - name: Emit cargo-audit SARIF
        if: always()
        run: |
          set -euo pipefail
          cargo audit --json > cargo-audit.json || true
          python3 .github/scripts/cargo-audit-to-sarif.py \
            < cargo-audit.json > cargo-audit.sarif
      - name: Upload cargo-audit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: cargo-audit.sarif
          category: cargo-audit
      - name: Fail if cargo-audit gate failed
        if: steps.cargo-audit-gate.outcome == 'failure'
        run: |
          echo "::error::cargo-audit reported advisories; see SARIF upload + step log."
          exit 1

  # ---------------------------------------------------------------------------
  # OSV-Scanner — runs the reusable workflow exactly as `sca.yml`
  # does. The action image bundles the OSV.dev dataset at build time;
  # the nightly pinning is to the same SHA on purpose so the analyzer
  # behavior matches the PR-time run. Cadence (nightly) is the value-add.
  # ---------------------------------------------------------------------------
  osv-scanner:
    name: OSV-Scanner (fresh DB)
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        -r
        --skip-git
        ./

  # ---------------------------------------------------------------------------
  # OWASP Dependency-Check — Maven-side scan. The plugin downloads
  # the NVD vulnerability database on each run; this job intentionally
  # does NOT restore the `actions/cache` of NVD data so a newly-published
  # CVE is picked up immediately rather than waiting on the cache to
  # expire. The trade-off is a slower run (~5 min of NVD download
  # vs ~30s warm), which is fine on a nightly cadence.
  # ---------------------------------------------------------------------------
  barback-owasp-dc:
    name: OWASP Dependency-Check (barback, fresh NVD)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      # NOTE: deliberately no `actions/cache` step for the OWASP NVD
      # data directory here. `sca.yml` caches it for PR latency; the
      # nightly workflow burns the cache so a same-day CVE shows up.
      - name: Run dependency-check (verify phase, opt-in profile)
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mvn -f barback/pom.xml -B -P dependency-check verify
      - name: Upload OWASP DC SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: barback/target/dependency-check-report.sarif
          category: owasp-dc

  # ---------------------------------------------------------------------------
  # Trivy `fs` scan — cross-ecosystem catch-all. The aquasecurity
  # action pulls a fresh vulnerability DB on every run (no in-image
  # cache to bust on the nightly schedule), matching `sca.yml`'s
  # behavior. Cadence is the value-add.
  #
  # `secret` scanner remains intentionally OFF — owned by
  # `secret-scan.yml`. Same rationale as `sca.yml`.
  # ---------------------------------------------------------------------------
  trivy-fs:
    name: Trivy fs (fresh DB)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run Trivy (filesystem scan, SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: false
          # trivy.yaml carries CVE-ID/misconfig-ID + path-scoped suppressions
          # for confirmed false positives (offline resolver fixtures, frozen
          # benchmark corpus, Helm golden test outputs, intentional distroless
          # design). barback/pom.xml CVEs are deliberately NOT suppressed there.
          # Without this config in the nightly run, suppressed FPs would bounce
          # back every 24 h and reopen already-closed alerts.
          trivy-config: trivy.yaml
          # Skip the roastery Helm chart: its `{{ fail }}` guard (BAR-AUTH-005)
          # aborts Trivy's Helm render and fails the scan. Mirrors sca.yml.
          skip-dirs: roastery/deploy/helm
      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs
