# CI workflow for Barista.
#
# Jobs:
#   rust-check    Fast feedback on every PR: cargo check + fmt + clippy.
#   rust-test     cargo test --workspace; split out so the slow tests don't
#                 gate the fast lint feedback.
#   rust-windows  cargo check + named-pipe IPC conformance suite +
#                 `barista verify --no-daemon` smoke build on
#                 windows-latest. Implements the D19 Windows CI
#                 matrix; gated on every PR.
#   barback       2x2 matrix over JDK (17, 21) and Maven (3.9.x, 4.0.x).
#                 Verifies the embedder works across every supported
#                 toolchain combination — a v0.1 release-gate requirement.
#   mvnd          Smoke test that `mvnd` 2.x can drive the barback build.
#   spdx-headers  Source-hygiene lint: every first-party source file
#                 carries the `MIT OR Apache-2.0` SPDX tag. No toolchain;
#                 pure git + bash, so it gives near-instant feedback.
#   actionlint    Self-check the workflow files in this directory.
#
# The toolchain matrix encoded here is the contract: any change to the
# supported Maven / JDK / mvnd versions must be reflected in both this
# file and `.tool-versions` at the repo root.
#
# Every action is pinned to a commit SHA (not a floating tag). The
# human-readable tag is recorded next to the SHA so future readers can
# audit drift. When bumping, update both the SHA and the comment.

name: CI

on:
  pull_request:
  push:
    branches: [main]

# Default-deny at the workflow level; each job opts in explicitly.
permissions: {}

jobs:
  rust-check:
    name: Rust check + fmt + clippy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install Rust toolchain (pinned in rust-toolchain.toml)
        # `dtolnay/rust-toolchain` was previously referenced as `@stable`
        # (a moving label that auto-tracks the action's logic for the
        # current Rust stable release). The action is now pinned to a
        # commit SHA per the SHA-pinning policy; the "use the stable
        # toolchain" intent is preserved via the `toolchain:` input.
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-03-27
        with:
          toolchain: stable
      - name: cargo check
        run: cargo check --workspace --all-targets
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    name: Rust test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install Rust toolchain (pinned in rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-03-27
        with:
          toolchain: stable
      # Wrapped in coreutils `timeout` (present on ubuntu-latest) so an
      # interrupted or hung run is killed as a process group rather than
      # orphaning the test binary. A wedged lock test used to reparent
      # to PID 1 and live forever; SIGTERM at 20 min, escalating to
      # SIGKILL 30s later, guarantees the binary cannot be orphaned.
      - name: cargo test
        run: timeout --signal=TERM --kill-after=30s 1200s cargo test --workspace

  rust-windows:
    name: Rust check + named-pipe conformance + verify smoke (windows)
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install Rust toolchain (pinned in rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-03-27
        with:
          toolchain: stable
      # JDK 21 is required for the Java side of the named-pipe
      # conformance suite (EchoPipeClient + EchoPipeClientCli under
      # `barback/src/test/java/.../conformance/`). The Unix-side
      # `barback` job exercises additional JDK / Maven combinations;
      # the Windows runner pins to the canonical pair (JDK 21 + Maven
      # 3.9.x) to keep wall-clock budget contained.
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'
      # The windows-latest runner image bundles Maven via Chocolatey,
      # but the binary may not be the version `barback/pom.xml` is
      # validated against. Force-install via setup-java's Maven hook
      # alternative would also work; for the matrix simplicity we
      # rely on the runner-provided `mvn.cmd` and verify the version
      # in a diagnostic step (so a future runner-image change can't
      # silently downgrade us).
      - name: Verify Maven on PATH
        run: |
          mvn -v
          java -version
      - name: cargo check
        run: cargo check --workspace --all-targets
      # Mirror of the Unix-side `barback` job's conformance step.
      # `--test-threads=1` serialises the 20 named-pipe conformance
      # tests so we don't fight for the limited per-process JVM-spawn
      # throughput on the runner. `--ignored` opts in to the
      # `#[ignore]`-gated suite (see `crates/barista-ipc/tests/
      # conformance_pipe.rs` for the gating rationale). Closes
      # M4.1 T8.
      - name: cross-language conformance (named pipe)
        run: cargo test -p barista-ipc --test conformance_pipe -- --ignored --test-threads=1
      # End-to-end smoke build per D19 / M4.3 T7. Drives `barista
      # verify` against a trivial 1-module fixture so we prove the
      # Windows binary boots and can shepherd a build to completion.
      #
      # Scope notes:
      #   - `--no-daemon` is mandatory for v0.1 on Windows: the
      #     barback daemon code path is `#[cfg(unix)]`-gated in
      #     `crates/barista-cli/src/cmd/mod.rs`, so the dispatch
      #     for `verify` falls back to the forked-`mvn` path
      #     (`cmd/no_daemon.rs`). The full Windows daemon-IPC
      #     happy-path is tracked as a follow-up.
      #   - `pwsh` is the default shell for `windows-latest` but
      #     we set it explicitly so the multi-line script semantics
      #     (and the `./target/release/barista.exe` path syntax)
      #     are unambiguous if the runner default ever changes.
      #   - This step depends on the `Set up JDK 21` step above:
      #     `actions/setup-java` installs `mvn.cmd` onto `$PATH`
      #     under `PATHEXT`, and `which::which("mvn.cmd")` inside
      #     `cmd/no_daemon.rs::resolve_mvn` picks it up there.
      #   - `--release` matches the artifact profile used in
      #     downstream packaging milestones; debug builds work
      #     too but produce a noisier baseline.
      - name: Smoke build — barista verify --no-daemon
        shell: pwsh
        run: |
          cargo build --release -p barista-cli
          ./target/release/barista.exe verify --no-daemon --root crates/barista-cli/tests/fixtures/windows-smoke

  barback:
    name: barback (JDK ${{ matrix.java-version }}, Maven ${{ matrix.maven-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        java-version: ['17', '21']
        # The Maven 4.0.0-rc-3 pin should be re-confirmed against
        # https://maven.apache.org/download.cgi when the workflow is
        # next touched — Maven 4 is still pre-GA and release cadence is
        # not predictable.
        maven-version: ['3.9.9', '4.0.0-rc-3']
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
      - name: Install Maven ${{ matrix.maven-version }}
        run: |
          set -euo pipefail
          MV="${{ matrix.maven-version }}"
          if [[ "$MV" == 4.* ]]; then
            SERIES=4
          else
            SERIES=3
          fi
          URL="https://archive.apache.org/dist/maven/maven-${SERIES}/${MV}/binaries/apache-maven-${MV}-bin.tar.gz"
          curl -fsSL "$URL" -o /tmp/maven.tar.gz
          mkdir -p "$HOME/.local/maven"
          tar -xzf /tmp/maven.tar.gz -C "$HOME/.local/maven"
          echo "$HOME/.local/maven/apache-maven-${MV}/bin" >> "$GITHUB_PATH"
      - name: Verify toolchain versions
        run: |
          mvn -v
          java -version
      - name: mvn test (parent)
        run: mvn -f barback/pom.xml -B test
      # The bench harness must compile under both JDK 17 and JDK 21
      # so the WorkerPool virtual-thread vs platform-thread numbers,
      # the PluginCache hit/miss numbers, and the embedded-Maven
      # cold-start numbers can all be recorded against both JDKs on
      # the operator-provisioned dashboard hardware. The benches
      # themselves are NOT run in CI (their wall-clock budget is too
      # high for per-PR feedback) — this step gates the shaded JAR's
      # *compile* in both matrix cells. We install the parent first
      # (skipping tests so the prior `mvn test` is not duplicated)
      # because the bench module declares a Maven dep on the parent
      # to drive its production code rather than reimplementing it.
      - name: mvn install (parent, skip tests)
        run: mvn -f barback/pom.xml -B install -DskipTests
      - name: mvn package (bench harness compiles)
        run: mvn -f barback/bench/pom.xml -B package -DskipTests
      # Cross-language Rust↔Java UDS conformance, scoped to the
      # canonical (JDK 21 + Maven 3.9.x) cell so the 22 #[ignore]-
      # gated tests run once per PR instead of four times. The
      # Windows-side mirror (named pipe) runs in the `rust-windows`
      # job above. Requires the Rust toolchain — installed only when
      # this cell matches.
      - name: Install Rust toolchain (for conformance harness)
        if: matrix.java-version == '21' && matrix.maven-version == '3.9.9'
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-03-27
        with:
          toolchain: stable
      - name: cross-language conformance (UDS)
        if: matrix.java-version == '21' && matrix.maven-version == '3.9.9'
        run: cargo test -p barista-ipc --test conformance -- --ignored --test-threads=1

  mvnd:
    name: mvnd smoke (2.x)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # The mvnd pin should be re-confirmed against
      # https://github.com/apache/maven-mvnd/releases when this workflow
      # is next touched.
      MVND_VERSION: '1.0.2'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'
      - name: Install mvnd ${{ env.MVND_VERSION }}
        run: |
          set -euo pipefail
          URL="https://github.com/apache/maven-mvnd/releases/download/${MVND_VERSION}/maven-mvnd-${MVND_VERSION}-linux-amd64.tar.gz"
          curl -fsSL "$URL" -o /tmp/mvnd.tar.gz
          mkdir -p "$HOME/.local/mvnd"
          tar -xzf /tmp/mvnd.tar.gz -C "$HOME/.local/mvnd"
          echo "$HOME/.local/mvnd/maven-mvnd-${MVND_VERSION}-linux-amd64/bin" >> "$GITHUB_PATH"
      - name: Verify mvnd version
        run: mvnd --version
      - name: mvnd test (parent)
        run: mvnd -f barback/pom.xml -B test

  spdx-headers:
    name: SPDX header lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      # No toolchain: the checker is pure `git ls-files` + `grep`, so this
      # job finishes in seconds and gives the fastest feedback in the
      # matrix. `check-spdx-headers.sh` is the single source of truth for
      # the first-party include/exclude globs; `--fix` (run locally) is
      # what authors use to stamp a new file.
      - name: Enforce dual MIT OR Apache-2.0 SPDX headers (first-party)
        run: bash scripts/check-spdx-headers.sh

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Run actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2
        with:
          files: '.github/workflows/*.yml'
