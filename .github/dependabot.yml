# Dependabot configuration.
#
# Three ecosystems are tracked here:
#   - github-actions  pinned-by-SHA workflow `uses:` lines under
#                     .github/workflows/. Action bumps are batched into a
#                     single weekly PR so review burden is bounded.
#   - cargo           the Rust workspace lockfile (Cargo.lock). Security
#                     updates open their own PRs (zero-batching) so they
#                     can land fast; the rest are batched weekly.
#   - maven           the barback Maven project at barback/pom.xml.
#                     Security updates are split out the same way.
#
# When Dependabot opens a PR, the SHA in `uses:` flips to the new
# commit and the inline `# vX.Y.Z` comment is rewritten by Dependabot
# automatically (it understands the trailing-comment convention).
#
# Reviewer tip: a Dependabot PR that bumps an action must touch BOTH
# the SHA and the comment. A PR that touches only one side is a bug.

version: 2

updates:
  # ---------------------------------------------------------------------------
  # GitHub Actions — pinned-by-SHA `uses:` lines across all workflows.
  # ---------------------------------------------------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
      include: scope
    groups:
      # One PR per week with every action bump in it. Keeps review
      # burden bounded; if a single bump is risky it can be split out
      # by hand at review time.
      actions:
        patterns:
          - "*"

  # ---------------------------------------------------------------------------
  # Cargo — Rust workspace lockfile at the repo root.
  # ---------------------------------------------------------------------------
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: "deps"
      include: scope
    groups:
      # Security advisories land in their own PRs so they can be
      # reviewed + merged ahead of routine bumps.
      cargo-security:
        applies-to: security-updates
        patterns:
          - "*"
      # Coupled crate families — these share a transitive version and MUST
      # bump together or they fail to compile, so group ALL their updates
      # (not just majors) into one coordinated PR. Listed before
      # cargo-routine because Dependabot assigns a dependency to the first
      # group it matches.
      #   - prost + prost-build (+ -types/-derive) must be the same version.
      #   - the RustCrypto hashes share the `digest` crate; bumping one
      #     alone (e.g. sha1 0.11 while sha2 stays 0.10) splits `digest`
      #     and breaks the build.
      cargo-prost:
        applies-to: version-updates
        patterns:
          - "prost"
          - "prost-*"
      cargo-rustcrypto:
        applies-to: version-updates
        patterns:
          - "sha1"
          - "sha2"
          - "sha3"
          - "digest"
          - "hmac"
          - "md-5"
      # Minor + patch batch into one weekly PR. Unrelated major bumps fall
      # out into their own individual PRs — a single breaking major
      # shouldn't block the whole routine batch, and majors warrant
      # individual review. (Coupled-family bumps are grouped above so they
      # don't split into individually-failing PRs.)
      cargo-routine:
        applies-to: version-updates
        update-types:
          - minor
          - patch
        patterns:
          - "*"

  # ---------------------------------------------------------------------------
  # Maven (barback) — the embedder POM at barback/pom.xml.
  # ---------------------------------------------------------------------------
  - package-ecosystem: maven
    directory: /barback
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - java
    commit-message:
      prefix: "deps"
      include: scope
    groups:
      maven-security:
        applies-to: security-updates
        patterns:
          - "*"
      # Coupled jakarta-era stack: the embedded Maven 4 core and its DI
      # layer (Sisu + Guice) all migrated from javax.inject to
      # jakarta.inject together, so group ALL their updates into one
      # coordinated PR (listed first; Dependabot first-match wins). That
      # PR rides with the javax->jakarta migration (#39) instead of
      # splitting into individually-failing bumps like guice 7 / sisu 1.0 /
      # Maven-4 rc-5 did.
      maven-jakarta-stack:
        applies-to: version-updates
        patterns:
          - "org.apache.maven:*"
          - "org.eclipse.sisu:*"
          - "com.google.inject:guice"
      # Minor + patch batch weekly; other (unrelated) major bumps break
      # out into their own individual PRs.
      maven-routine:
        applies-to: version-updates
        update-types:
          - minor
          - patch
        patterns:
          - "*"

  # Deliberately NOT tracked by Dependabot:
  #   - barback/bench/pom.xml          (JMH benchmark harness)
  #   - barback/spike/**/pom.xml       (throwaway m40 spikes)
  #   - bench/projects/**/pom.xml      (frozen benchmark checkouts)
  #   - crates/**/tests/fixtures/**    (resolver/CLI test-fixture POMs)
  #   - test-corpus/**                 (corpus baseline vendor POM)
  # None of these are shipped artifacts. Their dependency versions are
  # pinned on purpose — the resolver fixtures encode exact versions the
  # tests assert against, and the bench/corpus POMs freeze a baseline — so
  # a Dependabot bump would only create churn (and break the tests).
  # Dependabot version updates run only for the directories listed above,
  # so leaving these unlisted is what keeps them out of the PR stream;
  # do not add entries for them. (Their *vulnerability* findings are
  # likewise excluded from the SCA scanners in `sca.yml`.)
