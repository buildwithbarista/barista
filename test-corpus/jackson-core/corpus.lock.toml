id = "jackson-core"
description = "FasterXML Jackson core streaming JSON parser/generator."
git_url = "https://github.com/FasterXML/jackson-core.git"
ref = "jackson-core-2.18.0"
ref_kind = "tag"

jdk = "21"
maven_version = "3.9.9"

build_cmd = "mvn -B -DskipTests=false verify"

build_time_minutes = 5

notes = """
Single-module Maven project. Foundation for the wider Jackson ecosystem;
exercises a non-trivial plugin set (shade, bundle, animal-sniffer).
Bump the tag as newer 2.x releases ship.
"""
