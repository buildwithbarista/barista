# Source: roastery/templates/secret-tls.yaml
apiVersion: v1
kind: Secret
metadata:
  name: roastery-tls
  namespace: roastery
  labels:
    helm.sh/chart: roastery-0.1.0
    app.kubernetes.io/name: roastery
    app.kubernetes.io/instance: roastery
    app.kubernetes.io/version: "edge"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: barista
# `kubernetes.io/tls` is the canonical type for a cert/key pair
# (Ingress controllers and cert-manager both consume it). The keys are
# fixed: `tls.crt` and `tls.key`.
type: kubernetes.io/tls
stringData:
  # Canonical TLS Secret keys — also what kubernetes.io/tls Secrets
  # mounted via `existingSecret` are expected to carry. The deployment
  # template projects these keys to /etc/roastery/cert.pem and
  # /etc/roastery/key.pem inside the pod.
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA-fixture-cert-do-not-use
    -----END CERTIFICATE-----
    
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    MIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQ-fixture-key
    -----END PRIVATE KEY-----
