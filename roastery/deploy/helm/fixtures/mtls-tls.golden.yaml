# Source: roastery/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roastery
  namespace: roastery
  labels:
    helm.sh/chart: roastery-0.1.0
    app.kubernetes.io/name: roastery
    app.kubernetes.io/instance: roastery
    app.kubernetes.io/version: "edge"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: barista
spec:
  replicas: 1
  # filesystem + PVC implies single-replica → Recreate avoids the
  # "two pods racing for the same RWO volume" failure mode during an
  # upgrade. RollingUpdate is fine for the stateless backends.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: roastery
      app.kubernetes.io/instance: roastery
  template:
    metadata:
      labels:
        app.kubernetes.io/name: roastery
        app.kubernetes.io/instance: roastery
      annotations:
        # Roll the deployment when secret payloads change. The chart
        # tracks tls / bearer / mtls secret bodies via this checksum
        # so a `helm upgrade` that rotates a credential triggers a
        # rollout without an operator having to bounce the pods.
        checksum/secret-tls: 81bb6a7ebb01cfbed26837ce7772d33c2aaa6a094485e0a152b3c1604bd0249e
        checksum/secret-mtls: 1725bee494a93c0ef4b8d37d778bf94fcb98364a3d507c562803ca9514a1ec91
    spec:
      serviceAccountName: roastery
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: roastery
          image: "ghcr.io/buildwithbarista/roastery:edge"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7878
              protocol: TCP
          env:
            - name: ROASTERY_BIND
              value: "0.0.0.0:7878"
            - name: ROASTERY_STORAGE_DIR
              value: "/var/lib/roastery"
            - name: ROASTERY_STORAGE_BACKEND
              value: "fs"
            - name: ROASTERY_TLS_CERT
              value: /etc/roastery/cert.pem
            - name: ROASTERY_TLS_KEY
              value: /etc/roastery/key.pem
            - name: ROASTERY_MTLS_CA_CERT
              value: /etc/roastery/ca.pem
            - name: ROASTERY_UPSTREAM_FETCH_MISSING
              value: "false"
            - name: ROASTERY_UPSTREAM_TIMEOUT_SECS
              value: "30"
            - name: RUST_LOG
              value: "info"
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          startupProbe:
            failureThreshold: 30
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 1
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            # The distroless image runs with readOnlyRootFilesystem: true;
            # the binary writes to its storage dir (PVC or emptyDir) and
            # uses /tmp for ephemera. Mount /tmp as an emptyDir so the
            # rest of the rootfs stays read-only.
            - name: tmp
              mountPath: /tmp
            - name: storage
              mountPath: "/var/lib/roastery"
            - name: tls
              mountPath: /etc/roastery/cert.pem
              subPath: cert.pem
              readOnly: true
            - name: tls
              mountPath: /etc/roastery/key.pem
              subPath: key.pem
              readOnly: true
            - name: mtls-ca
              mountPath: /etc/roastery/ca.pem
              subPath: ca.pem
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: storage
          persistentVolumeClaim:
            claimName: roastery-data
        - name: tls
          secret:
            secretName: roastery-tls
            items:
              # Project the canonical Secret keys (`tls.crt`/`tls.key`,
              # used by kubernetes.io/tls Secrets and cert-manager) to
              # the filenames the binary's env vars point at.
              - key: tls.crt
                path: cert.pem
              - key: tls.key
                path: key.pem
        - name: mtls-ca
          secret:
            secretName: roastery-mtls-ca
            items:
              - key: ca.pem
                path: ca.pem
---
# Source: roastery/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: roastery
  namespace: roastery
  labels:
    helm.sh/chart: roastery-0.1.0
    app.kubernetes.io/name: roastery
    app.kubernetes.io/instance: roastery
    app.kubernetes.io/version: "edge"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: barista
spec:
  ingressClassName: nginx
  tls:
    - hosts:
      - roastery.example.com
      secretName: roastery-ingress-tls
  rules:
    - host: "roastery.example.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: roastery
                port:
                  number: 7878
