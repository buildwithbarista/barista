# Source: roastery/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roastery
  namespace: roastery
  labels:
    helm.sh/chart: roastery-0.1.0
    app.kubernetes.io/name: roastery
    app.kubernetes.io/instance: roastery
    app.kubernetes.io/version: "edge"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: barista
spec:
  replicas: 3
  # filesystem + PVC implies single-replica → Recreate avoids the
  # "two pods racing for the same RWO volume" failure mode during an
  # upgrade. RollingUpdate is fine for the stateless backends.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      app.kubernetes.io/name: roastery
      app.kubernetes.io/instance: roastery
  template:
    metadata:
      labels:
        app.kubernetes.io/name: roastery
        app.kubernetes.io/instance: roastery
      annotations:
        # Roll the deployment when secret payloads change. The chart
        # tracks tls / bearer / mtls secret bodies via this checksum
        # so a `helm upgrade` that rotates a credential triggers a
        # rollout without an operator having to bounce the pods.
        checksum/secret-bearer: 20640e5c8e4bb3f170086e4cc5a3ab7ccded84356721cd2da23fa058cab79861
    spec:
      serviceAccountName: roastery
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: roastery
          image: "ghcr.io/buildwithbarista/roastery:edge"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7878
              protocol: TCP
          env:
            - name: ROASTERY_BIND
              value: "0.0.0.0:7878"
            - name: ROASTERY_STORAGE_DIR
              value: "/var/lib/roastery"
            - name: ROASTERY_STORAGE_BACKEND
              value: "s3"
            - name: ROASTERY_STORAGE_BUCKET
              value: "roastery-cache-prod"
            - name: ROASTERY_STORAGE_REGION
              value: "us-east-1"
            - name: ROASTERY_BEARER_TOKENS_FILE
              value: /etc/roastery/tokens.txt
            - name: ROASTERY_UPSTREAM_FETCH_MISSING
              value: "false"
            - name: ROASTERY_UPSTREAM_TIMEOUT_SECS
              value: "30"
            - name: RUST_LOG
              value: "info"
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          startupProbe:
            failureThreshold: 30
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 1
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            # The distroless image runs with readOnlyRootFilesystem: true;
            # the binary writes to its storage dir (PVC or emptyDir) and
            # uses /tmp for ephemera. Mount /tmp as an emptyDir so the
            # rest of the rootfs stays read-only.
            - name: tmp
              mountPath: /tmp
            - name: storage
              mountPath: "/var/lib/roastery"
            - name: bearer-tokens
              mountPath: /etc/roastery/tokens.txt
              subPath: tokens.txt
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: storage
          # Non-filesystem backends keep no on-disk state worth
          # preserving; emptyDir is enough to satisfy the WORKDIR.
          emptyDir: {}
        - name: bearer-tokens
          secret:
            secretName: roastery-bearer-tokens
            items:
              - key: tokens
                path: tokens.txt
---
