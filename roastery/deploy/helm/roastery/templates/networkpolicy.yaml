{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "roastery.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "roastery.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "roastery.selectorLabels" . | nindent 6 }}
  policyTypes:
    {{- toYaml .Values.networkPolicy.policyTypes | nindent 4 }}
  {{- if has "Ingress" .Values.networkPolicy.policyTypes }}
  ingress:
    - ports:
        - port: 7878
          protocol: TCP
      {{- with .Values.networkPolicy.ingressFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- end }}
{{- end }}
