{{- if and .Values.auth.bearer.enabled .Values.auth.bearer.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-bearer-tokens" (include "roastery.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "roastery.labels" . | nindent 4 }}
type: Opaque
stringData:
  # The binary reads the file pointed to by ROASTERY_BEARER_TOKENS_FILE.
  # Format: one `<label>:<secret>` per line; comments begin with `#`.
  # See roastery/README.md "Bearer tokens".
  tokens: |
    {{- .Values.auth.bearer.tokens | nindent 4 }}
{{- end }}
