{{- if and .Values.auth.mtls.enabled .Values.auth.mtls.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-mtls-ca" (include "roastery.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "roastery.labels" . | nindent 4 }}
type: Opaque
stringData:
  # PEM bundle of one-or-more trust anchors. Mounted at
  # /etc/roastery/ca.pem; `ROASTERY_MTLS_CA_CERT` points the binary at
  # that path.
  ca.pem: |
    {{- .Values.auth.mtls.caCertPem | nindent 4 }}
{{- end }}
