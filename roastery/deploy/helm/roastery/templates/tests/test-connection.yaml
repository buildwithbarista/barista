apiVersion: v1
kind: Pod
metadata:
  name: {{ include "roastery.fullname" . }}-test-connection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "roastery.labels" . | nindent 4 }}
  annotations:
    # `helm test <release>` runs every pod tagged with this hook and
    # waits for it to exit. `hook-delete-policy` cleans up regardless
    # of outcome so the namespace doesn't accumulate completed Pods.
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: curl
      # Pinned to a specific curl-images tag so the test stays
      # deterministic across cluster nodes. Bump intentionally.
      image: curlimages/curl:8.10.1
      imagePullPolicy: IfNotPresent
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      command:
        - sh
        - -c
        - |
          set -eu
          BASE="http://{{ include "roastery.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}"
          echo "Probing $BASE/healthz"
          curl --fail --silent --show-error --max-time 5 "$BASE/healthz" | grep -q '^ok'
          echo "Probing $BASE/version"
          curl --fail --silent --show-error --max-time 5 "$BASE/version" | grep -q '"name":"roastery"'
          echo "Probing $BASE/metrics"
          curl --fail --silent --show-error --max-time 5 -o /dev/null -w '%{http_code}\n' "$BASE/metrics" | grep -q '^200$'
          echo "OK: roastery responds on /healthz, /version, /metrics"
      resources:
        limits:
          cpu: 100m
          memory: 64Mi
        requests:
          cpu: 10m
          memory: 16Mi
